Foxwell_HaulCargo_MultiToSingle_desc_01=Something weird is going on at the old Hathor mining facilities. Both the platform alignment facilities and orbital laser platforms have been abandoned and gathering dust for decades, but outlaws have started using them as a base of operations.\n\nWe’ve been hired by a concerned party who’s recently lost a lot of important cargo to one such gang. Currently, their stuff is stashed at <EM4>~mission(Location1|Address)</EM4> and <EM4>~mission(Location2|Address)</EM4>, but there’s a growing fear that the gang may be offloading their goods soon. That’s why we’ve been hired to hit both of those Hathor facilities, retrieve the cargo from the freight elevators, and bring it to the freight elevator at <EM4>~mission(Destination|Address)</EM4>. \n\nHere’s the specifics on what to grab from each location. Doesn’t matter in what order you do this, as long as it all gets collected and delivered. Just be sure to bring a ship that can handle <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4>.  It also wouldn't hurt to bring a <EM4>handheld tractor beam</EM4> with you.   \n\n~mission(MultiToSingleToken)\n\nFoxwell hasn’t been able to scout these locations, but if I were you, I’d expect to face some serious armed resistance. Best bring a bunch of gear and some friends.\n\n\nMarcus Clenn\nFoxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Potential Blueprints</EM4>\n- Antium Arms Maroon\n- Antium Core Maroon\n- Antium Legs Maroon\n- Antium Helmet Maroon\n- Antium Helmet Moss Camo\n- Antium Arms Moss Camo\n- Antium Core Moss Camo\n- Antium Legs Moss Camo\n
Foxwell_HaulCargo_AToB_PAF_desc_01=A crew recently raided a distribution center and made off with <EM4>~mission(CargoGradeToken) load of cargo</EM4>. Foxwell has been hired to get all those goods back. We’re getting reports of these outlaws using old Hathor facilities as stash houses and we believe the stolen items are currently at <EM4>~mission(Location|Address)</EM4>.\n\nIf interested, you’ll need a ship that can handle <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4>. Doubt you’ll be able to slip in and out of that PAF without being noticed either, so best be prepared to clear the location. Once safe, grab the goods from the freight elevator and deliver them to the <EM4>freight elevator at ~mission(Destination|Address)</EM4>. \n\nIt also wouldn't hurt to bring a <EM4>handheld tractor beam</EM4> with you.   \n\n\nMarcus Clenn\nFoxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Potential Blueprints</EM4>\n- Antium Arms Maroon\n- Antium Core Maroon\n- Antium Legs Maroon\n- Antium Helmet Maroon\n- Antium Helmet Moss Camo\n- Antium Arms Moss Camo\n- Antium Core Moss Camo\n- Antium Legs Moss Camo\n
Foxwell_HaulCargo_AToB_OLP_desc_01=Looking for a contractor with the right skills and ship for an important mission. Outlaws ambushed a Hull C carrying a <EM4>~mission(CargoGradeToken)</EM4> load of cargo and took it to <EM4>~mission(Location|Address)</EM4>. We’ve been hired to get it all back.  \n\nThe cargo is being stored somewhere at a defunct Hathor facility. The place is big and crawling with outlaws. Need someone to retrieve the goods from the freight elevator there and deliver it all back to the <EM4>freight elevator at ~mission(Destination|Address)</EM4>. Don’t think this will be a walk in the park. Bring lots of ammo and a ship that can handle <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4>. \n\nIt also wouldn't hurt to bring a <EM4>handheld tractor beam</EM4> with you.   \n\n\nMarcus Clenn\nFoxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Potential Blueprints</EM4>\n- Antium Arms Maroon\n- Antium Core Maroon\n- Antium Legs Maroon\n- Antium Helmet Maroon\n- Antium Helmet Moss Camo\n- Antium Arms Moss Camo\n- Antium Core Moss Camo\n- Antium Legs Moss Camo\n
Foxwell_ShipWaveAttack_ClearHostiles_Title_VE_001=Yellow Level Contract: Clear Shipjacking Group\n\n<EM4>Potential Blueprints</EM4>\n- Parallax Energy Assault Rifle\n- Antium Arms\n- Antium Core\n- Antium Legs\n- Antium Helmet\n- Parallax Rifle Battery (80 Cap)\n
Foxwell_ShipWaveAttack_ClearHostiles_Desc_E_001=Okay, this might be a bit of stretch to do on your own, so if you got any favors to call in, it could be good to cash those chits now. There's a group of desperados striking delivery ships up and down this sector and we've been tasked with cleaning them up. \n\nOnce your crew is ready, head over to ~mission(Location|Address) and take the hostiles there down. Now, these bastards are a bit clever so they tend to split up into smaller packs. Make sure you wait around to clear every last one of them out.\n \nGood luck,\n\nMarcus Clenn\nFoxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives."\n\n<EM4>Potential Blueprints</EM4>\n- Parallax Energy Assault Rifle\n- Antium Arms\n- Antium Core\n- Antium Legs\n- Antium Helmet\n- Parallax Rifle Battery (80 Cap)\n
Foxwell_ShipWaveAttack_ClearHostiles_Title_M_001=Orange Level Contract: Destroy Outlaw Threat\n\n<EM4>Potential Blueprints</EM4>\n- Parallax Energy Assault Rifle\n- Antium Arms\n- Antium Core\n- Antium Legs\n- Antium Helmet\n- Parallax Rifle Battery (80 Cap)\n
Foxwell_ShipWaveAttack_ClearHostiles_Desc_H_001=It seems that a couple of different small-time gangs have decided to pool their resources and start doing coordinated attacks. Alone, they weren't much, but all together they're proving to be a serious threat that has to be dealt with.\n\nRecruit some backup you can rely on and the fly over to ~mission(Location|Address). Once you attack the initial gang members you find there, the other groups will arrive to support them. Make sure you wait around to take out all of them.\n \nGood luck,\n\nMarcus Clenn\nFoxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Potential Blueprints</EM4>\n- Parallax Energy Assault Rifle\n- Antium Arms\n- Antium Core\n- Antium Legs\n- Antium Helmet\n- Parallax Rifle Battery (80 Cap)\n
Hockrow_FacilityDelve_P3M1_desc=Hockrow Agency \nCase File #JD10285\nLead Investigator: Arken Mallor\n\nCase Update: \nAll your digging around Onyx has paid off. I’ve been able to confirm that Jorrit has been operating an off-the-record lab in the facility’s Site-B in order to conduct an experiment he calls “Project Hyperion.” I’ll send his <EM4>lab notes to your mobiGlas journal</EM4> once you’re underway, but the long and short of it is the bastard is trying to make Humans evolve or some nonsense like that.\n\nThe client wants the experimental data, so you’re going back to Onyx and do everything needed to get Project Hyperion up and running. \n\nContract Investigator Actions:\nPrep the experiment by collecting a <EM4>Reagent code from the Engineering wing</EM4> and a <EM4>Catalyst code from the Research wing</EM4>.\n\nOnce you have those, head down to the <EM4>Lab in Site-B</EM4> and <EM4>run the experiment</EM4> so you can <EM4>upload the results</EM4>.\n\nAdditional Notes:\nSince this is an active lab, there might be ASD security on-site.\n \nTravel to Onyx in a vehicle that can be stored in a large hangar.\n\n\n<EM4>Potential Blueprints (Repeat Only)</EM4>\n- Zenith "Darkwave" Laser Sniper Rifle\n- Fresnel "Molten" Energy LMG\n- Geist Armor Arms ASD Edition\n- Geist Armor Core ASD Edition\n- Geist Armor Legs ASD Edition\n- Geist Armor Helmet ASD Edition\n- Zenith Laser Sniper Rifle Battery (22 Cap)\n
Hockrow_FacilityDelve_P2M1_Repeat_desc=Hockrow Agency \nCase File #JD10285\nLead Investigator: Arken Mallor\n\nCase Update: \nIt would be helpful to have the most recent energy anomaly data so that we can compare it to what you delivered last time. Any difference between the two data sets could prove useful.\n\nContract Investigator Actions:\nExplore the <EM4>Engineering</EM4> wing and <EM4>retrieve the Energy Anomaly data</EM4> and deliver it to <EM4>~mission(Destination|Address)</EM4>.\n\nAdditional Notes:\nBe wary of possible hostile forces on site. \n\nTravel to Onyx in a vehicle that can be stored in a large hangar.\n\nOnce you hand off this data, I'll send you a <EM4>ASD Secure Drive</EM4> that you can collect at your home location.\n\n<EM4>Potential Blueprints</EM4>\n<EM4>[Regional Variants] example locations: microTech, MIC L1, MIC L2</EM4>\n- Fresnel Energy LMG\n- Zenith Laser Sniper Rifle\n- Geist Armor Arms Forest\n- Geist Armor Core Forest\n- Geist Armor Legs Forest\n- Geist Armor Helmet Forest\n- Corbel Arms Mire\n- Corbel Core Mire\n- Corbel Legs Mire\n- Corbel Helmet Mire\n- Fresnel Energy LMG Battery (165 Cap)\n\n<EM4>[Regional Variants] example locations: microTech, MIC L1, MIC L2</EM4>\n- Fresnel "Icebox" Energy LMG\n- Geist Armor Arms Rogue\n- Geist Armor Core Rogue\n- Geist Armor Legs Rogue\n- Geist Armor Helmet Rogue\n- Geist Armor Arms Whiteout\n- Geist Armor Core Whiteout\n- Geist Armor Legs Whiteout\n- Geist Armor Helmet Whiteout\n- Corbel Arms Smolder\n- Corbel Core Smolder\n- Corbel Legs Smolder\n- Corbel Helmet Smolder\n- Fresnel Energy LMG Battery (165 Cap)\n
Hockrow_FacilityDelve_P2M2_Repeat_desc=Hockrow Agency \nCase File #JD10285\nLead Investigator: Arken Mallor\n\nCase Update: \nOut of an over-abundance of caution, it would be good to see if the security systems have picked up anything new since the last batch of data you delivered. That way we can make sure we’re up-to-date on what’s been happening down there.\n\nContract Investigator Actions:\nExplore the <EM4>Research</EM4> wing and <EM4>retrieve the Security data</EM4> and deliver it to <EM4>~mission(Destination|Address)</EM4>.\n\nAdditional Notes:\nBe wary of possible hostile forces on site. \n\nTravel to Onyx in a vehicle that can be stored in a large hangar.\n\nOnce you hand off this data, I'll send you a <EM4>ASD Secure Drive</EM4> that you can collect at your home location.\n\n<EM4>Potential Blueprints</EM4>\n- Fresnel "Rockfall" Energy LMG\n- Zenith "Landslide" Laser Sniper Rifle\n- Geist Armor Arms\n- Geist Armor Core\n- Geist Armor Legs\n- Geist Armor Helmet\n- Corbel Arms Patina\n- Corbel Core Patina\n- Corbel Legs Patina\n- Corbel Helmet Patina\n- Fresnel Energy LMG Battery (165 Cap)\n
Hockrow_FacilityDelve_P2M3_Repeat_desc=Hockrow Agency \nCase File #JD10285\nLead Investigator: Arken Mallor\n\nCase Update: \nOne of the biggest issue when it comes to ongoing investigations is intel growing stale. To help alleviate that, I’m going to have you head back into Onyx and grab the latest seismic sensor data. Would be good to see what the latest readings say.\n\nContract Investigator Actions:\nExplore the <EM4>Research</EM4> wing and <EM4>retrieve the Seismic data</EM4> and deliver it to <EM4>~mission(Destination|Address)</EM4>.\n\nAdditional Notes:\nBe wary of possible hostile forces on site.\n \nTravel to Onyx in a vehicle that can be stored in a large hangar.\n\nOnce you hand off this data, I'll send you a <EM4>ASD Secure Drive</EM4> that you can collect at your home location.\n\n<EM4>Potential Blueprints</EM4>\n- Zenith "Thunderstrike" Laser Sniper Rifle\n- Geist Armor Helmet Desert\n- Geist Armor Arms Desert\n- Geist Armor Core Desert\n- Geist Armor Legs Desert\n- Geist Armor Arms Whiteout\n- Geist Armor Core Whiteout\n- Geist Armor Legs Whiteout\n- Geist Armor Helmet Whiteout\n- Corbel Arms Halcyon\n- Corbel Core Halcyon\n- Corbel Legs Halcyon\n- Corbel Helmet Halcyon\n- Zenith Laser Sniper Rifle Battery (22 Cap)\n
Intersec_DefendShip_Desc_Easy_001=MISSION SPECS\n\nArea of Operation: Nyx System \nHostile Forces: Outlaws\nEquipment Specs: Combat-rated Ship \nBriefing: Require urgent assistance for an InterSec operative who is currently under fire at <EM4>~mission(Location|Address)</EM4>.\n\nA group of outlaws had previously taken our operative captive with the intention of extracting sensitive information from them, but miraculously they were able to escape. Unfortunately, the pursuing outlaws now have them pinned down.\n\nDue to the number of the ships assaulting them, we're offering additional compensation to accommodate the added danger. <EM4>Recruiting additional ships</EM4> to support you in this mission is highly advised.\n\nRespectfully,   \n\nDeacon Tobin \nOperations Manager \nInterSec Defense Solutions  \n\nThis communication consists of confidential information solely intended for the recipient. Please disregard if received in error and notify the sender. All operations are conducted at the contractor’s own personal risk and must adhere to UEE and system law where applicable.\n\n<EM4>Potential Blueprints</EM4>\n- Pulse "Rouge" Pistol\n- Testudo Arms Combustion\n- Testudo Core Combustion\n- Testudo Legs Combustion\n- Testudo Helmet Combustion\n- Pulse Laser Pistol Battery (60 Cap)\n
Intersec_DefendShip_Desc_Medium_001=MISSION SPECS\n\nArea of Operation: Nyx System \nHostile Forces: Outlaws\nEquipment Specs: Combat-rated Ships\nBriefing: An undercover agent of ours was compromised and is now being pursued by the outlaw pack they had infiltrated. As such, they are in need of immediate extraction at <EM4>~mission(Location|Address)</EM4>. \n\nOnce on site, engage with all hostiles in order to provide cover so our operative can QT away.\n\n<EM4>Bring additional backup</EM4> and don't underestimate these outlaws. They are violent and motivated so they are unlikely to give up anytime soon.\n\nRespectfully,\n\nDeacon Tobin \nOperations Manager \nInterSec Defense Solutions  \n\nThis communication consists of confidential information solely intended for the recipient. Please disregard if received in error and notify the sender. All operations are conducted at the contractor’s own personal risk and must adhere to UEE and system law where applicable.\n\n<EM4>Potential Blueprints</EM4>\n- Pulse "Rouge" Pistol\n- Testudo Arms Combustion\n- Testudo Core Combustion\n- Testudo Legs Combustion\n- Testudo Helmet Combustion\n- Pulse Laser Pistol Battery (60 Cap)\n
Intersec_DefendShip_Desc_Hard_001=MISSION SPECS\n\nArea of Operation: Nyx System \nHostile Forces: Outlaws\nEquipment Specs: Combat-rated Ships\nBriefing: One of our pilots is under attack at <EM4>~mission(Location|Address)</EM4> and is in need of assistance.\n\nThis operative is carrying key information regarding a coordinated attack on key UEE infrastructure and it is vital that they are able to deliver it to us. You and any <EM4>dependable pilots you can recruit</EM4> are charged with protecting them from the outlaws in pursuit long enough for them to QT away.\n\nRespectfully,   \n\nDeacon Tobin \nOperations Manager \nInterSec Defense Solutions  \n\nThis communication consists of confidential information solely intended for the recipient. Please disregard if received in error and notify the sender. All operations are conducted at the contractor’s own personal risk and must adhere to UEE and system law where applicable.\n\n<EM4>Potential Blueprints</EM4>\n- Pulse "Rouge" Pistol\n- Testudo Arms Combustion\n- Testudo Core Combustion\n- Testudo Legs Combustion\n- Testudo Helmet Combustion\n- Pulse Laser Pistol Battery (60 Cap)\n
Intersec_DefendShip_Vanduul_Desc_VeryHard_001=MISSION SPECS\n\nArea of Operation: Nyx System \nHostile Forces: Vanduul \nEquipment Specs: Combat-rated Ships \nBriefing: We've just lost contact with a pilot who engaged with Vanduul forces at <EM4>~mission(Location|Address)</EM4>.\n\nTravel to their last known location and if they're still alive, defend them long enough to ensure they can escape. Ensuring the safety of the operative is crucial, as is eliminating any Vanduul threats to the UEE.\n\nYou'll most likely need a <EM4>strong group of ships</EM4> to successfully neutralize these Vanduul.\n\nRespectfully,   \n\nDeacon Tobin \nOperations Manager \nInterSec Defense Solutions  \n\nThis communication consists of confidential information solely intended for the recipient. Please disregard if received in error and notify the sender. All operations are conducted at the contractor’s own personal risk and must adhere to UEE and system law where applicable.\n\n<EM4>Potential Blueprints</EM4>\n- Pulse "Rouge" Pistol\n- Testudo Arms Combustion\n- Testudo Core Combustion\n- Testudo Legs Combustion\n- Testudo Helmet Combustion\n- Pulse Laser Pistol Battery (60 Cap)\n
Intersec_DefendShip_Vanduul_Desc_Super_001=MISSION SPECS\n\nArea of Operation: Nyx System\nHostile Forces: Vanduul\nEquipment Specs: Combat-rated Ship\nBriefing: An operator working with InterSec is currently being attacked by Vanduul ships at <EM4>~mission(Location|Address)</EM4>. The likelihood of them surviving on their own is low, so we’re looking for a contractor willing to provide combat support.  \n\nContractors accepting this mission should be well supplied and ready to face the Vanduul threat head-on. \n\nRespectfully, \n\nDeacon Tobin\nOperations Manager\nInterSec Defense Solutions\n\nThis communication consists of confidential information solely intended for the recipient. Please disregard if received in error and notify the sender. All operations are conducted at the contractor’s own personal risk and must adhere to UEE and system law where applicable.\n\n<EM4>Potential Blueprints</EM4>\n- Pulse "Rouge" Pistol\n- Testudo Arms Combustion\n- Testudo Core Combustion\n- Testudo Legs Combustion\n- Testudo Helmet Combustion\n- Pulse Laser Pistol Battery (60 Cap)\n
Intersec_KillShip_Desc_Intro_001=MISSION SPECS\n\nArea of Operation: Nyx System\nHostile Forces: Outlaws\nEquipment Specs: Combat-rated Ships\nBriefing: InterSec has been hired to combat the rising number of outlaws using Nyx as a staging ground for their operations, with the intention of attacking neighboring UEE systems.\n\nAs a preventative measure, we require you to travel to <EM4>~mission(Location|Address)</EM4> and eliminate the ringleader <EM4>~mission(TargetName)</EM4> to deter their planned attack on Stanton. They and their crew are highly dangerous and you are <EM4>advised  to bring a wingman</EM4> for support.\n\nContractors who can prove themselves reliable and competent in executing operations will be eligible for future missions with InterSec.\n\nRespectfully,\n\nDeacon Tobin\nOperations Manager\nInterSec Defense Solutions\n\nThis communication consists of a non-binding offer that upon acceptance may be immediately terminated by either party without any given notice. All operations are conducted at the contractor’s own personal risk and must adhere to system law where applicable.\n\n<EM4>Potential Blueprints</EM4>\n- R97 Shotgun\n- Monde Arms\n- Monde Core\n- Monde Legs\n- Monde Helmet\n- Monde Arms Hiro\n- Monde Core Hiro\n- Monde Legs Hiro\n- Monde Helmet Hiro\n- R97 Shotgun Magazine (18 cap)\n
Intersec_KillShip_Desc_Easy_001=MISSION SPECS\n\nArea of Operation: Nyx System\nHostile Forces: Outlaws\nEquipment Specs: Combat-rated Ships\nBriefing: InterSec has identified more outlaws who are planning an operation against UEE interests from within Nyx. Your mission will be to neutralize this potential threat before they can enact their plans.\n\nTravel to <EM4>~mission(Location|Address)</EM4> and dispatch the leader of these outlaws, <EM4>~mission(TargetName)</EM4> without hesitation. We have scouted a small number of ships, but our report suggest these are competent pilots - <EM4>bringing back up is advised.</EM4>\n\nRemember that eliminating these outlaws not only serves the people of Nyx, but the UEE too.\n\nRespectfully,\n\nDeacon Tobin\nOperations Manager\nInterSec Defense Solutions\n\nThis communication consists of a non-binding offer that upon acceptance may be immediately terminated by either party without any given notice. All operations are conducted at the contractor’s own personal risk and must adhere to system law where applicable.\n\n<EM4>Potential Blueprints</EM4>\n- R97 Shotgun\n- Monde Arms\n- Monde Core\n- Monde Legs\n- Monde Helmet\n- Monde Arms Hiro\n- Monde Core Hiro\n- Monde Legs Hiro\n- Monde Helmet Hiro\n- R97 Shotgun Magazine (18 cap)\n
Intersec_KillShip_Desc_Medium_001=MISSION SPECS\n\nArea of Operation: Nyx System\nHostile Forces: Outlaws\nEquipment Specs: Combat-rated Ships\nBriefing: Seemingly unsatisfied with their takings in Nyx, an outlaw group lead by <EM4>~mission(TargetName)</EM4> has been planning a major strike against the UEE. This cannot be allowed to come to pass.\n\nThanks to the work of our Intelligence team, we've been able to track them down to <EM4>~mission(Location|Address)</EM4>.\n\nHead there as soon as you can and engage before they have a chance to leave the system. Based on our strategic analysis, we recommend a <EM4>well-armed and skilled fleet</EM4> will be necessary for the successful completion of this mission.\n\nRespectfully, \n\nDeacon Tobin \nOperations Manager \nInterSec Defense Solutions  \n\nThis communication consists of a non-binding offer that upon acceptance may be immediately terminated by either party without any given notice. All operations are conducted at the contractor’s own personal risk and must adhere to system law where applicable.\n\n<EM4>Potential Blueprints</EM4>\n- R97 Shotgun\n- Monde Arms\n- Monde Core\n- Monde Legs\n- Monde Helmet\n- Monde Arms Hiro\n- Monde Core Hiro\n- Monde Legs Hiro\n- Monde Helmet Hiro\n- R97 Shotgun Magazine (18 cap)\n
Intersec_KillShip_Desc_Hard_001=MISSION SPECS\n\nArea of Operation: Nyx System\nHostile Forces: Outlaws\nEquipment Specs: Combat-rated Ships\nBriefing: InterSec requires a skilled contractor to eliminate a highly dangerous group of criminals based in Nyx who are planning a coordinated strike on a prominent member of the UEE Navy.\n\nWe have intercepted a crucial piece of intelligence suggesting a known terrorist by the name of <EM4>~mission(TargetName)</EM4> intends to carry out this assassination along with the help of local criminal elements.\n\nThey are currently located at <EM4>~mission(Location|Address)</EM4>, making this an ideal time for us to strike. Be warned, these outlaws are experienced killers - bringing a <EM4>group of trustworthy allies</EM4> is advised.\n\nRespectfully, \n\nDeacon Tobin \nOperations Manager \nInterSec Defense Solutions  \n\nThis communication consists of a non-binding offer that upon acceptance may be immediately terminated by either party without any given notice. All operations are conducted at the contractor’s own personal risk and must adhere to system law where applicable.\n\n<EM4>Potential Blueprints</EM4>\n- R97 Shotgun\n- Monde Arms\n- Monde Core\n- Monde Legs\n- Monde Helmet\n- Monde Arms Hiro\n- Monde Core Hiro\n- Monde Legs Hiro\n- Monde Helmet Hiro\n- R97 Shotgun Magazine (18 cap)\n
Intersec_KillShip_Vanduul_Desc_VeryHard_001=MISSION SPECS\n\nArea of Operation: Nyx System\nHostile Forces: Vanduul\nEquipment Specs: Combat-rated Ships\nBriefing: InterSec is in need of a highly skilled combat pilot who can locate and neutralize a dangerous Vanduul target.\n\nAn operator of ours has identified a Vanduul ship flying within the vicinity of <EM4>~mission(Location|Address)</EM4>. We've been given strict instructions to eliminate any Vanduul spotted on the fringes of UEE space, for fear of encroachment into the Empire's territory.\n\nBring a <EM4>small fleet of competent pilots</EM4> with you to engage and neutralize the target.\n\nRespectfully, \n\nDeacon Tobin \nOperations Manager \nInterSec Defense Solutions  \n\nThis communication consists of a non-binding offer that upon acceptance may be immediately terminated by either party without any given notice. All operations are conducted at the contractor’s own personal risk and must adhere to system law where applicable.\n\n<EM4>Potential Blueprints</EM4>\n- R97 Shotgun\n- Monde Arms\n- Monde Core\n- Monde Legs\n- Monde Helmet\n- Monde Arms Hiro\n- Monde Core Hiro\n- Monde Legs Hiro\n- Monde Helmet Hiro\n- R97 Shotgun Magazine (18 cap)\n
InterSec_KillShip_Vanduul_Desc_Super_001=MISSION SPECS\n\nArea of Operation: Nyx System\nHostile Forces: Vanduul\nEquipment Specs: Combat-rated Ship\nBriefing: InterSec requires the services of a skilled pilot who’s prepared to assist in taking down a dangerous Vanduul target that has been involved in numerous attacks.\n\nVanduul incursions have been on the rise recently, posing not only a threat to the system of Nyx, but the UEE as a whole. It is imperative that these sightings are responded to in a swift and efficient manner. \n\nWe require you to fly to the last known sighting of the Vanduul ship at <EM4>~mission(Location|Address)</EM4> and eliminate them immediately.  \n\nVanduul pilots are highly skilled and extremely dangerous. Engage the enemy immediately and do not hesitate – they will not show the same mercy.\n\nCompensation proportionate to the risk of the contract will be awarded.\n\n\nRespectfully,\nDeacon Tobin\nOperations Manager\nInterSec Defense Solutions\n\nThis communication consists of a non-binding offer that upon acceptance may be immediately terminated by either party without any given notice. All operations are conducted at the contractor’s own personal risk and must adhere to system law where applicable.\n\n<EM4>Potential Blueprints</EM4>\n- R97 Shotgun\n- Monde Arms\n- Monde Core\n- Monde Legs\n- Monde Helmet\n- Monde Arms Hiro\n- Monde Core Hiro\n- Monde Legs Hiro\n- Monde Helmet Hiro\n- R97 Shotgun Magazine (18 cap)\n
InterSec_SecurityPatrol_H_Desc_001=MISSION SPECS\n\nArea of Operation: Nyx System\nHostile Forces: Outlaws\nEquipment Specs: Combat-rated Ships\nBriefing: InterSec has received intelligence that outlaws are planning to launch an attack on a target within the UEE. In an effort to prevent this from happening, we need a contractor to patrol a sector we believe these outlaws are using to prepare for their attack.\n\nOutlaw activity in this sector is higher than normal, so InterSec recommends that you <EM4>bring backup</EM4>. When ready, dispatch to the <EM4>location marker</EM4> on your HUD and scan the waypoints along the route. Once you've confirmed that the entire sector is clear, the main contractor will receive a bonus of <EM4>~mission(ScripAmount) MG Scrip.</EM4> \n\nRespectfully,\n\nDeacon Tobin\nOperations Manager\nInterSec Defense Solutions\n\nThis communication consists of a non-binding offer that upon acceptance may be immediately terminated by either party without any given notice. All operations are conducted at the contractor’s own personal risk and must adhere to system law where applicable.\n\n<EM4>Potential Blueprints</EM4>\n- Quartz "Lumen" Energy SMG\n- Testudo Arms Nightveil\n- Testudo Core Nightveil\n- Testudo Legs Nightveil\n- Testudo Helmet Nightveil\n- Quartz "Deadfall" Energy SMG\n- Testudo Arms Turfwar\n- Testudo Core Turfwar\n- Testudo Legs Turfwar\n- Testudo Helmet Turfwar\n- Quartz Energy SMG Battery (45 cap)\n
InterSec_SecurityPatrol_VH_desc_001=MISSION SPECS\n\nArea of Operation: Nyx System\nHostile Forces: Outlaws\nEquipment Specs: Combat-rated Ships\nBriefing: InterSec has been tracking increased outlaw activity in certain sectors of the system. This activity in conjunction with other intelligence leads us to believe that outlaws are planning an attack on elements traveling from the UEE. We're aiming to patrol these sectors and disrupt any plans before they can be put into action.\n\nCurrently, we need someone who can help patrol a highly dangerous sector. Once you've accepted the mission, you can proceed to the <EM4>location marker</EM4> on your HUD. From there, we'll send you along a specific route with additional waypoints to scan. Complete the patrol and we'll send the main contractor a bonus of <EM4>~mission(ScripAmount) MG Scrip.</EM4>\n\nDue to the high probability of attack and general threat level of local outlaws, we recommend <EM4>recruiting trusted wingmen</EM4> to provide combat support.\n\nRespectfully,\n\nDeacon Tobin\nOperations Manager\nInterSec Defense Solutions\n\nThis communication consists of a non-binding offer that upon acceptance may be immediately terminated by either party without any given notice. All operations are conducted at the contractor’s own personal risk and must adhere to system law where applicable.\n\n<EM4>Potential Blueprints</EM4>\n- Quartz "Lumen" Energy SMG\n- Testudo Arms Nightveil\n- Testudo Core Nightveil\n- Testudo Legs Nightveil\n- Testudo Helmet Nightveil\n- Quartz "Deadfall" Energy SMG\n- Testudo Arms Turfwar\n- Testudo Core Turfwar\n- Testudo Legs Turfwar\n- Testudo Helmet Turfwar\n- Quartz Energy SMG Battery (45 cap)\n
InterSec_SecurityPatrol_S_Desc_001=MISSION SPECS\n\nArea of Operation: Nyx System\nHostile Forces: Vanduul\nEquipment Specs: Combat-rated Ships\nBriefing: There's a growing concern that Vanduul hunting parties are pushing further into Nyx. The first line of defense against this encroachment is increased patrols. InterSec has identified a sector that has seen an uptick in Vanduul activity and are looking for someone to patrol the region and provide an update on it.\n\nYou'll begin your patrol at a <EM4>location marker</EM4> sent to your HUD and then scan a series of waypoints along a designated route. The Vanduul ships in this sector are highly skilled and aggressive, so InterSec highly recommends that you <EM4>bring several combat-ready ships along as backup</EM4>.\n\nInterSec understands the immense danger you'll be under on this patrol, so we'll send a special bonus of <EM4>~mission(ScripAmount) MG Scrip</EM4> to the main contractor once the sector is clear.      \n\nRespectfully,\n\nDeacon Tobin\nOperations Manager\nInterSec Defense Solutions\n\nThis communication consists of a non-binding offer that upon acceptance may be immediately terminated by either party without any given notice. All operations are conducted at the contractor’s own personal risk and must adhere to system law where applicable.\n\n<EM4>Potential Blueprints</EM4>\n- Quartz "Lumen" Energy SMG\n- Testudo Arms Nightveil\n- Testudo Core Nightveil\n- Testudo Legs Nightveil\n- Testudo Helmet Nightveil\n- Quartz "Deadfall" Energy SMG\n- Testudo Arms Turfwar\n- Testudo Core Turfwar\n- Testudo Legs Turfwar\n- Testudo Helmet Turfwar\n- Quartz Energy SMG Battery (45 cap)\n
Kaboos_Mission_Description=MISSION SPECS\n\nArea of Operation: Nyx System\nHostile Forces: Outlaws present and armed\nEquipment Specs: Combat-rated Ship, Personal Arms\nBriefing: InterSec needs your services once again.\n\nThe intel you previously gathered has been invaluable in identifying several prominent buyers of the illegally-obtained Vanduul parts. However, since then the Shattered Blade have continued their operations and the UEE is requesting that we <EM4>update our intel.</EM4>\n\nWe believe more information can be retrieved from the storage facilities located at the old <EM4>QV Logistics station.</EM4>\n\nThe operation parameters haven’t changed since your last mission: find the <EM4>encrypted data</EM4> and use the <EM4>decryption key</EM4> to decipher and upload the list to us. The Shattered Blade will have reinforced the area since the last time, so expect resistance.\n\nGood luck. We’ll be in touch.\n\n\nRespectfully,\n\nDeacon Tobin\nOperations Manager\nInterSec Defense Solutions\n\nThis communication consists of confidential information solely intended for the recipient. Please disregard if received in error and notify sender. All operations are conducted at the contractor’s own personal risk and must adhere to UEE and system law where applicable.\n\n<EM4>Potential Blueprints</EM4>\n- Pulse "Blacklist" Pistol\n- Quartz Energy SMG\n- Quartz "Black Op" Energy SMG\n- Testudo Arms\n- Testudo Core\n- Testudo Legs\n- Testudo Helmet\n- Testudo Helmet Clanguard\n- Testudo Core Clanguard\n- Testudo Legs Clanguard\n- Testudo Arms Clanguard\n- Quartz Energy SMG Battery (45 cap)\n- Pulse Laser Pistol Battery (60 Cap)\n
InterSec_ResourceGathering_Cryopods_Desc=MISSION SPECS\n\nArea of Operation: Nyx System\nHostile Forces: Outlaws present and armed\nEquipment Specs: <EM4>Cargo Capable Ship</EM4>, Personal Arms, <EM4>Heavy-Duty Tractor Beam</EM4>\nBriefing: \nOur latest intel shows that the Shattered Blade have replenished their stock of Vanduul corpses and will shortly be transferring them from the old <EM4>QV Logistics station</EM4>they're operating from to an interested buyer. The UEE can't have another incident like what happened with ASD so they're eager for us to <EM4>recover the cryopods</EM4> and deliver them to <EM4>the freight elevator at ~mission(Destination|Address)</EM4>.\n\nWhile the Shattered Blade members present at the site might offer resistance, they are not the focus of you mission. Deal with them as needed and get the cryopods. \n\nRespectfully,\n\nDeacon Tobin\nOperations Manager\nInterSec Defense Solutions\n\nThis communication consists of confidential information solely intended for the recipient. Please disregard if received in error and notify sender. All operations are conducted at the contractor’s own personal risk and must adhere to UEE and system law where applicable.\n\n<EM4>Potential Blueprints</EM4>\n- Pulse Laser Pistol\n- Testudo Arms Earthshake\n- Testudo Core Earthshake\n- Testudo Legs Earthshake\n- Testudo Helmet Earthshake\n- Pulse Laser Pistol Battery (60 Cap)\n
InterSec_ResourceGathering_Tech_Desc=MISSION SPECS\n\nArea of Operation: Nyx System\nHostile Forces: Outlaws present and armed\nEquipment Specs: Combat-rated Ship, Personal Arms\nBriefing: \nTo prevent the Shattered Blade from flooding the black market with xeno-contraband, the UEE has charged InterSec with <EM4>recovering a stash of Vanduul Plating and Metal.</EM4> from the old <EM4>QV Logistics station</EM4> the gang has been occupying. Once you have the materials in your posession, deliver them to the freight elevator at <EM4>~mission(Destination|Address)</EM4>.\n\nFollowing from your previous experience, it would not be surprising if the Shattered Blade offer resistance, but ensure that your focus is on recovering the materials.\n\nRespectfully,\n\nDeacon Tobin\nOperations Manager\nInterSec Defense Solutions\n\nThis communication consists of confidential information solely intended for the recipient. Please disregard if received in error and notify sender. All operations are conducted at the contractor’s own personal risk and must adhere to UEE and system law where applicable.\n\n<EM4>Potential Blueprints</EM4>\n- Pulse Laser Pistol\n- Testudo Arms Earthshake\n- Testudo Core Earthshake\n- Testudo Legs Earthshake\n- Testudo Helmet Earthshake\n- Pulse Laser Pistol Battery (60 Cap)\n
northrock_bounty_fps_UGF_boss_desc_001=Hey, \n\nHave an interesting bounty for you. A high level criminal by the name ~mission(TargetName) has been located at ~mission(Location|Address). \n\nBased on our intel, its highly unlikely that the target’s going to be sitting and waiting out in the open. You most likely will have to infiltrate the facility and draw them out. \n\nSomething like a large firefight should be enough to do the trick. \n\nBest of luck,\n\nBraden Corchado\nLogistics Officer - Stanton Branch\nNorthrock Service Group\n\n\n<EM4>Potential Blueprints</EM4>\n- F55 LMG\n- LH86 Pistol\n- Defiance Arms Tactical\n- Defiance Core Tactical\n- Defiance Legs Tactical\n- Defiance Helmet Tactical\n- Lynx Arms\n- Lynx Legs\n- Lynx Core\n- Oracle Helmet\n- F55 LMG Magazine (150 cap)\n
northrock_bounty_fps_UGF_boss_nocivs_desc_001=Hey, \n\nGot a contract for you that requires a bit more tactics than usual. A high-level criminal by the name ~mission(TargetName) is hiding with a large contingent of outlaws at ~mission(Location|Address). \n\nOur intel suggests that ~mission(TargetName|Last)’s forces most likely will act as defensive line in order to protect their boss. My best guess is that you will have to deal with them before you gain access to ~mission(TargetName|Last).\n\nThat said, I don’t want you shooting indiscriminately. Sometimes these outlaws keep civilians around and they should be treated like non-combatants.\n\nBest of luck,\n\nBraden Corchado\nLogistics Officer - Stanton Branch\nNorthrock Service Group\n\n\n<EM4>Potential Blueprints</EM4>\n- F55 LMG\n- LH86 Pistol\n- Defiance Arms Tactical\n- Defiance Core Tactical\n- Defiance Legs Tactical\n- Defiance Helmet Tactical\n- Lynx Arms\n- Lynx Legs\n- Lynx Core\n- Oracle Helmet\n- F55 LMG Magazine (150 cap)\n
Foxwell_ShipAmbush_VE_desc_001=Care to help us ghost a bad guy? \n\nWe’ve been hired to hunt down an outlaw flying a <EM4>~mission(AmbushTarget)</EM4>. Shouldn’t be too hard since they take the same flightpath each day. That makes them a prime target for an ambush if I ever saw one. I’ve analyzed the route and determined that <EM4>~mission(Location|Address)</EM4> is the ideal spot to strike. There’s an emission cloud there that’ll be perfect to hide your ship’s signature while you wait.   \n\nJob is simple if you’re interested. Head to the location, hide out, power down, and then wait for them to fly by. Sometimes they roll alone but they often have other single-seat ships with them. Shouldn’t be too hard to handle for a pro. Plus, we’ll still have reinforcements nearby and ready to deploy once it pops off.\n\nPull this off and we'll give the main contractor a bonus payment of <EM4>~mission(ScripAmount) MG Scrip</EM4>.\n\nGood luck,\n\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Potential Blueprints</EM4>\n- Parallax "Sunstone" Energy Assault Rifle\n- Antium Arms Jet\n- Antium Core Jet\n- Antium Legs Jet\n- Antium Helmet Jet\n- Parallax Rifle Battery (80 Cap)\n
Foxwell_ShipAmbush_E_desc_001=An outlaw who’s been on the run finally returned to the system. Seems like they hoped that disappearing for a bit would make us forget about them. They’re not even trying to hide their identity or vary their routine which means we know exactly where they’re going to be.\n\nLatest intel indicates that they’re flying a <EM4>~mission(AmbushTarget)</EM4> and will be passing by <EM4>~mission(Location|Address)</EM4> soon. I’ve already scoped out an emission cloud that’s a perfect place for you to find cover, power down your ship, and wait. Only real variable is if they’ll be alone or not. We’ve heard they sometimes roll with friends that all fly single-seaters. Landing that first surprise strike will be important as this crew is battle-tested, but we’ll have reinforcements at the ready to provide support if you need them.\n\nGet this done and we'll give the main contractor a bonus payment of <EM4>~mission(ScripAmount) MG Scrip</EM4>.\n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Potential Blueprints</EM4>\n- Parallax "Sunstone" Energy Assault Rifle\n- Antium Arms Jet\n- Antium Core Jet\n- Antium Legs Jet\n- Antium Helmet Jet\n- Parallax Rifle Battery (80 Cap)\n
Foxwell_ShipAmbush_M_desc_001=Foxwell has been tracking a <EM4>~mission(AmbushTarget)</EM4> used by outlaws and discovered a pattern to its movements. The ship should be passing by <EM4>~mission(Location|Address)</EM4> soon.\n\nLooking for a contractor willing to hustle there, hide in the emission cloud, and then spring the trap when the time is right. There’s usually escort ships with the <EM4>~mission(AmbushTarget)</EM4>. Careful not to jump the gun and blow your cover. The element of surprise is crucial from what I’ve read.\n\nPull this off and we'll give the main contractor a bonus payment of <EM4>~mission(ScripAmount) MG Scrip</EM4>.\n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Potential Blueprints</EM4>\n- Parallax "Sunstone" Energy Assault Rifle\n- Antium Arms Jet\n- Antium Core Jet\n- Antium Legs Jet\n- Antium Helmet Jet\n- Parallax Rifle Battery (80 Cap)\n
Foxwell_ShipAmbush_H_desc_001=Recently, a <EM4>~mission(AmbushTarget)</EM4> baited Foxwell forces with a bogus rescue beacon. By the time our forces realized what was happening, a squad of ships unleashed a devastating attack and only one Foxwell contractor survived. Their scan logs identified the bait ship, and we’ve had scouts monitoring them ever since.\n\nOur surveillance has revealed the squad has a regular flight pattern that we think we can exploit. There’s a sizable emission cloud at <EM4>~mission(Location|Address)</EM4> that makes it an ideal spot to post up. Think you have what it takes to handle this for us? \n\nIt’ll be you against the <EM4>~mission(AmbushTarget)</EM4>, other large craft, and a sizable escort. Wish I could be more specific than that but this crew regularly rotates ships in and out of the squad. Would be smart to bring some support, so you don’t get overwhelmed by their numbers.   \n\nComplete the job and we'll give the main contractor a bonus payment of <EM4>~mission(ScripAmount) MG Scrip</EM4>.\n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Potential Blueprints</EM4>\n- Parallax "Sunstone" Energy Assault Rifle\n- Antium Arms Jet\n- Antium Core Jet\n- Antium Legs Jet\n- Antium Helmet Jet\n- Parallax Rifle Battery (80 Cap)\n
Foxwell_ShipAmbush_VH_desc_001=Foxwell got word from an important client that outlaws have put together a squad that’s been stalking the system with sub-capital ships and escort fighters. Our client is concerned that if left unchecked, outlaws will create more of these attack squads and destabilize system security. We’ve been hired to wipe out this group before that happens. \n\nWe need a confident and skilled contractor for this task. Good news is that we have a plan in place. One of the ships used by this squad, a <EM4>~mission(AmbushTarget)</EM4>, was stolen from our client, who’s still able to track its movements. They’ve shared the location data with us and we’ve discovered that this squad often goes by <EM4>~mission(Location|Address)</EM4>. We’ve scouted the location and discovered a large emission cloud makes an ideal spot for an ambush.  \n\nNot going to lie, this isn’t going to be easy. We don’t have any additional forces available to deploy, so it would be good to bring your own support. \n\nYou manage to pull this off, I've arranged for a bonus payment of <EM4>~mission(ScripAmount) MG Scrip</EM4> for the main contractor.\n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Potential Blueprints</EM4>\n- Parallax "Sunstone" Energy Assault Rifle\n- Antium Arms Jet\n- Antium Core Jet\n- Antium Legs Jet\n- Antium Helmet Jet\n- Parallax Rifle Battery (80 Cap)\n
Foxwell_ShipAmbush_S_desc_001=We’ve received a handful of comms about recent attacks undertaken by an <EM4>~mission(AmbushTarget)</EM4> and its escort ships. After opening a file, we started tracking the ship’s movements and noticed that it frequently passes an emission cloud near <EM4>~mission(Location|Address)</EM4>. We want to use that to our advantage to launch a surprise attack. \n\nOnce on site, you should hide in the emission cloud to cloak your signature enough to allow you to make the first strike. Unfortunately, Foxwell can’t provide additional reinforcements for this operation, so you’ll be responsible for bringing any support forces. You might need the help too. The crew of the ~mission(AmbushTarget) is aggressive and battle hardened.        \n\nYou get this taken care of for us and there's a bonus payment of <EM4>~mission(ScripAmount) MG Scrip</EM4> in it for the main contractor.\n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Potential Blueprints</EM4>\n- Parallax "Sunstone" Energy Assault Rifle\n- Antium Arms Jet\n- Antium Core Jet\n- Antium Legs Jet\n- Antium Helmet Jet\n- Parallax Rifle Battery (80 Cap)\n
Foxwell_DefendLocation_VE_Desc_001=Outlaw ships are harassing anyone attempting to land or leave our client’s operations at <EM4>~mission(DefendLocationWrapperLocation|Address)</EM4>. Need someone to fly there to defend the site and protect our client’s ships before the situation gets out of control. Get there, get after those aggressors, and I'll keep you updated on the situation. \n\nHelp take care of this and we'll pass along a bonus payment of <EM4>~mission(ScripAmount) MG Scrip</EM4> to the main contractor.\n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Potential Blueprints</EM4>\n- Parallax "Shock Trooper" Energy Assault Rifle\n- Antium Arms Storm\n- Antium Core Storm\n- Antium Legs Storm\n- Antium Helmet Storm\n- Parallax Rifle Battery (80 Cap)\n
Foxwell_DefendLocation_E_Desc_001=Ships coming and going from <EM4>~mission(DefendLocationWrapperLocation|Address)</EM4> are being targeted by hostile forces. The folks there have hired us to deal with this problem immediately.\n\nNeed someone to get there pronto and start fighting off these ships. The situation appears to be constantly evolving, so I’ll keep you updated on where you’re needed most. \n\nFor the hustle and effort, we’ll also be paying a bonus of <EM4>~mission(ScripAmount) MG Scrip</EM4> to the main contractor for dealing with this.\n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Potential Blueprints</EM4>\n- Parallax "Shock Trooper" Energy Assault Rifle\n- Antium Arms Storm\n- Antium Core Storm\n- Antium Legs Storm\n- Antium Helmet Storm\n- Parallax Rifle Battery (80 Cap)\n
Foxwell_DefendLocation_M_Desc_001=We’ve got clients reporting outlaw attacks on ships around <EM4>~mission(DefendLocationWrapperLocation|Address)</EM4>. They got locked down tight and anybody heading in or out is a target. Any attempts to solve the issue have just been met with more outlaw reinforcements appearing. \n\nThe client is desperate for a solution, so we’re hiring a contractor to go and restore peace in the area. If any other issues flare up once you're there, I’ll comm you directions on how to help.  \n\nReally need someone on this fast. So to sweeten the pot, the main contractor will also get a bonus payment of <EM4>~mission(ScripAmount) MG Scrip</EM4>.\n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Potential Blueprints</EM4>\n- Parallax "Shock Trooper" Energy Assault Rifle\n- Antium Arms Storm\n- Antium Core Storm\n- Antium Legs Storm\n- Antium Helmet Storm\n- Parallax Rifle Battery (80 Cap)\n
Foxwell_DefendLocation_H_Desc_001=The folks at <EM4>~mission(DefendLocationWrapperLocation|Address)</EM4> are under attack and need our support. Their ships in the wider area are being targeted and there’s a growing concern that this is only a precursor to something bigger.  \n\nThe situation is evolving, but I’m being fed constant updates on what’s going on and will keep you informed as the contract progresses. \n\nAre you available to come to their aid? Would be smart to recruit some friends to help. These are important clients and we can’t afford to fail them. The main contractor will earn a bonus payment of <EM4>~mission(ScripAmount) MG Scrip</EM4> if you get the job done.\n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Potential Blueprints</EM4>\n- Parallax "Shock Trooper" Energy Assault Rifle\n- Antium Arms Storm\n- Antium Core Storm\n- Antium Legs Storm\n- Antium Helmet Storm\n- Parallax Rifle Battery (80 Cap)\n
Foxwell_DefendLocation_VH_Desc_001=Ship support is needed at <EM4>~mission(DefendLocationWrapperLocation|Address)</EM4> immediately. Our client’s interests in the area are under fierce attack by outlaw forces. Looking for someone who can grab their gear, a few support ships they can trust, and deploy before it’s too late. Once you arrive, I’ll send any sitrep updates your way.  \n\nDon’t mess this up. These clients are paying for and expecting top tier protection. If anything goes wrong, we could lose this contract. That’s why we’ll give the main contractor a bonus payment of <EM4>~mission(ScripAmount) MG Scrip</EM4> if all goes down without a hitch.\n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Potential Blueprints</EM4>\n- Parallax "Shock Trooper" Energy Assault Rifle\n- Antium Arms Storm\n- Antium Core Storm\n- Antium Legs Storm\n- Antium Helmet Storm\n- Parallax Rifle Battery (80 Cap)\n
Foxwell_DefendLocation_S_Desc_001=Looking for a consummate professional to handle a high-stakes job. We’ve got VIP clients at <EM4>~mission(DefendLocationWrapperLocation|Address)</EM4> who are facing extremely aggressive and motivated outlaws targeting ships around their location. Exact details on the attack are still rolling in, but it appears to be a wide ranging, multi-pronged operation. \n\nIf you’re available, I highly recommend that you bring additional combat support ships, plenty of supplies, and your A-game. Get this right, and we’ll reward the main contractor with a bonus payment of <EM4>~mission(ScripAmount) MG Scrip</EM4>.\n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Potential Blueprints</EM4>\n- Parallax "Shock Trooper" Energy Assault Rifle\n- Antium Arms Storm\n- Antium Core Storm\n- Antium Legs Storm\n- Antium Helmet Storm\n- Parallax Rifle Battery (80 Cap)\n
Foxwell_SecurityPatrol_VE_Desc_001=Time to knock out a routine patrol for one of our long-term clients. The route is a series of waypoints that need to be visited and scanned to confirm everything’s as expected. Should be simple enough.  \n\nIf interested, please accept and head to the <EM4>location marker</EM4> on your HUD to start. Pull this off and the main contractor will get a bonus payment of <EM4>~mission(ScripAmount) MG Scrip.</EM4>\n\n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Potential Blueprints</EM4>\n- Parallax "Sanguine" Energy Assault Rifle\n- Antium Arms Sand\n- Antium Core Sand\n- Antium Legs Sand\n- Antium Helmet Sand\n- Parallax Rifle Battery (80 Cap)\n
Foxwell_SecurityPatrol_E_Desc_001=Need someone to knock out a security patrol. You’ll need to go to the <EM4>location marker</EM4> on your HUD and then scan several designated waypoints ensuring that they’re safe and secure. \n\nSatellites in that region have been acting up recently. Not exactly sure what’s going on out there, but best be prepared in case there’s any trouble.\n\nComplete this contract and the main contractor will get a bonus payment of <EM4>~mission(ScripAmount) MG Scrip.</EM4>\n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Potential Blueprints</EM4>\n- Parallax "Sanguine" Energy Assault Rifle\n- Antium Arms Sand\n- Antium Core Sand\n- Antium Legs Sand\n- Antium Helmet Sand\n- Parallax Rifle Battery (80 Cap)\n
Foxwell_SecurityPatrol_M_Desc_001=A client is concerned about activity near some of their interests. We’ve been contracted to patrol the area and run scans at several locations. Interested? If so, head to the <EM4>location marker</EM4> on your HUD to start the patrol.\n\nThe client wasn’t specific about the threats, but they don’t think everything’s on the level out there. Hopefully we’ll be able to bring them some peace of mind.\n\nAdditionally, the client arranged for us to offer a bonus payment of <EM4>~mission(ScripAmount) MG Scrip</EM4> to the main contractor.\n\n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Potential Blueprints</EM4>\n- Parallax "Sanguine" Energy Assault Rifle\n- Antium Arms Sand\n- Antium Core Sand\n- Antium Legs Sand\n- Antium Helmet Sand\n- Parallax Rifle Battery (80 Cap)\n
Foxwell_SecurityPatrol_H_Desc_001=Several unknown ships have been spotted in areas frequented by haulers delivering goods for our client. They’re worried these ships are monitoring their haulers in preparation for an ambush, so they’ve hired us to patrol the area. \n\nStart by going to the <EM4>location marker</EM4> on your HUD and scan it to ensure it’s clear. After that, we’ll send you to some other areas to scan for potential threats. We recommend that you bring a <EM4>wingman</EM4> and plenty of supplies to be ready to handle whatever might come your way.     \n\nAlso know that successfully completing this contract will earn the main contractor a bonus payment of <EM4>~mission(ScripAmount) MG Scrip.</EM4>\n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Potential Blueprints</EM4>\n- Parallax "Sanguine" Energy Assault Rifle\n- Antium Arms Sand\n- Antium Core Sand\n- Antium Legs Sand\n- Antium Helmet Sand\n- Parallax Rifle Battery (80 Cap)\n
Foxwell_SecurityPatrol_VH_Desc_001=A client needs our help. Outlaws are roaming certain sectors where they do business and attacking anyone they come across. Our client has already lost several ships and can’t afford to lose anymore. \n\nWe need someone to patrol those areas and draw out any hostile forces. The job begins with you heading to the <EM4>location marker</EM4> on your HUD and scanning. Then we’ll share a handful of other patrol points for you to scan. \n\nFrom the sound of it, these packs of ships feature skilled and aggressive pilots. Best be ready to rumble if you run into any of them. Would be good to have at least <EM4>two trusted pilots</EM4> by your side for this one.\n\nAt the end of a successful patrol, the main contractor will get a bonus payment of <EM4>~mission(ScripAmount) MG Scrip.</EM4>\n\nStay chilly,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Potential Blueprints</EM4>\n- Parallax "Sanguine" Energy Assault Rifle\n- Antium Arms Sand\n- Antium Core Sand\n- Antium Legs Sand\n- Antium Helmet Sand\n- Parallax Rifle Battery (80 Cap)\n
Foxwell_SecurityPatrol_S_Desc_001=Need a battle-hardened pilot for an important patrol. A prominent client is fed up with outlaws targeting their ships and satellites. We’ve been hired to scan the areas in question and deal with any hostile forces. The patrol begins at the <EM4>location marker</EM4> on your HUD before moving to a number of other locations we’ll expect you to clear.\n\nNot sure what you’ll run into out there, but based on intel shared by the client, they’re frequently seeing fighter groups of five to seven ships roaming the region. Some even have larger ships leading the charge. That means you better be ready for a serious fight. If you can, try to recruit at least <EM4>three friends</EM4> to the cause. Even a seasoned pilot will need all the help they can get against this crew.   \n\nSince this is going to be a tough one, the main contractor will get a bonus payment of <EM4>~mission(ScripAmount) MG Scrip</EM4> at the end of the patrol.\n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Potential Blueprints</EM4>\n- Parallax "Sanguine" Energy Assault Rifle\n- Antium Arms Sand\n- Antium Core Sand\n- Antium Legs Sand\n- Antium Helmet Sand\n- Parallax Rifle Battery (80 Cap)\n
Highpoint_KillAnimals_rockcracker_desc_E_001=If you have any work that's going to be bringing you to one of those old QV Breaker Stations in the Keeger Belt, we have something else that we could use your help on while you're there.\n \nWe've recently been contacted by the People's Alliance to assist with an initiative to help prepare these abandoned stations for repairs. Unfortunately, a Valakkar infestation is creating serious problems for not only the stations' infrastructure, but also for the chances of them being brought back online one day. Due to Valakkar's status as an invasive species, we have decided that culling them is the only viable option.\n \nReduce the Valakkar numbers at any of the old QV Breaker Stations and we will offer you payment.\n \nBest,\n \nWanda Werkheiser\n\nContract Manager\n\nHighpoint Wilderness Specialists\n\n\n<EM4>Potential Blueprints</EM4>\n- R97 Shotgun\n- Monde Arms\n- Monde Core\n- Monde Legs\n- Monde Helmet\n- Monde Arms Hiro\n- Monde Core Hiro\n- Monde Legs Hiro\n- Monde Helmet Hiro\n- R97 Shotgun Magazine (18 cap)\n
RAIN_collectresources_multiple_GEN_desc_01=To all available contractors,\n\nRayari scientists are hard at work trying to solve the issues with failing regen tech. Currently, their efforts are hindered by a lack of materials which they believe could be essential for their experiments.  \n\nIn particular, our scientists at <EM4>~mission(Destination|Address)</EM4> have had to put their work on hold after running out of those resources. With a restock from our normal provider not possible for months owing to short supply, we’ll pay a premium to anyone who can assist with restocking the materials.\n\nFor more information on the animals in question, refer to "Explorer's Guide to Harvestables" in your Journal.\n\nTogether we can make the universe better for all.\n\nNarina Lerrem\nSenior Manager\nClinical Research Outsourcing\n<EM4>Potential Blueprints (Yormandi Eye Only)</EM4>\n<EM4>Region bountyhuntersguild_paf_eliminatespecific</EM4>\n- P8-AR Rifle\n- Palatino Arms\n- Palatino Core\n- Palatino Legs\n- Palatino Helmet\n- Palatino Arms Moonfall\n- Palatino Core Moonfall\n- Palatino Legs Moonfall\n- Palatino Helmet Moonfall\n- P8-AR Rifle Magazine (15 Cap)\n\n<EM4>Region rayari_recoveritem_irradiated</EM4>\n- Prism "Deep Sea" Laser Shotgun\n- Prism "Bonedust" Laser Shotgun\n- Prism "Firesteel" Laser Shotgun\n- Prism Laser Shotgun\n- Stirling Exploration Suit\n- Siebe Helmet\n- Prism Laser Shotgun Battery (20 cap)\n
RAIN_collectresources_single_OLP_desc_01=To all available contractors,\n\nOur research team at at <EM4>~mission(Destination|Address)</EM4> is working tirelessly on solving the current ‘Regen Crisis’ and addressing the issue of unstable imprints. Their work has produced promising results, but a lack of a key resource is impeding their ability to run further experiments. \n\nWe’ve received word from our supplier that increased demand combined with lower mining yields means that we won’t receive our scheduled shipment for another few months. Our research team can’t wait that long, and we’re hoping you can help.      \n\nThe resource is hard to come by, but we have it on good authority that the old Hathor mining facilities were built in areas with a high concentration of the ore. Since Hathor went defunct not long after establishing their operations in- system, there’s a good chance that activating one of these mining lasers could provide you with what we need.\n\nTogether we can make the universe better for all.\n\nNarina Lerrem\nSenior Manager\nClinical Research Outsourcing\n\n\n<EM4>Potential Blueprints</EM4>\n- Pulse Laser Pistol\n- Pulse "Blacklist" Pistol\n- Pulse "Rouge" Pistol\n- Quartz Energy SMG\n- Quartz "Deadfall" Energy SMG\n- Quartz "Black Op" Energy SMG\n- Quartz "Lumen" Energy SMG\n- Quartz Energy SMG Battery (45 cap)\n- Pulse Laser Pistol Battery (60 Cap)\n
RAIN_collectresources_multiple_OLP_desc_01=To all available contractors,\n\nRayari scientists are hard at work trying to solve the issues with failing regen tech. Currently, their efforts are hindered by a lack of three resources essential for their experiments: <EM4>saldynium, jaclium, and carinite</EM4>.  \n\nIn particular, our scientists at <EM4>~mission(Destination|Address)</EM4> have had to put their work on hold after running out of those resources. With a restock from our normal provider not possible for months owing to short supply, we’ll pay a premium to anyone who can assist with restocking the materials.\n\nThough we haven’t been able to do thorough scans, there’s a strong belief among our teams that Hathor’s defunct Orbital Laser Platforms were built above areas with a high concentration of these resources. Reactivating these OLP could be your best hope of acquiring what we need.\n\nTogether we can make the universe better for all.\n\nNarina Lerrem\nSenior Manager\nClinical Research Outsourcing\n\n\n<EM4>Potential Blueprints</EM4>\n- Pulse Laser Pistol\n- Pulse "Blacklist" Pistol\n- Pulse "Rouge" Pistol\n- Quartz Energy SMG\n- Quartz "Deadfall" Energy SMG\n- Quartz "Black Op" Energy SMG\n- Quartz "Lumen" Energy SMG\n- Quartz Energy SMG Battery (45 cap)\n- Pulse Laser Pistol Battery (60 Cap)\n
