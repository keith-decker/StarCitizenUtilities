Headhunters_eliminateall_caves_desc_01=Hey,\n\nSome two-bit thugs are holed up in ~mission(Location|Address). Wouldn’t pay them any mind, except the arrogant skags tried to hit an outpost under our protection.\n\nWe chased 'em off with little trouble, but we can't let that kind of disrespect go unpunished. Our Clips are busy with some bigger fish, so we'd like you to take care of this for us. \n\nStows out.\n\n<EM4>Potential Blueprints</EM4>\n- Atzkav Sniper Rifle\n- Atzkav "Igniter" Sniper Rifle\n- Atzkav "Mirage" Sniper Rifle\n- Calico Arms Tactical\n- Calico Core Tactical\n- Calico Legs Tactical\n- Calico Helmet Tactical\n- Atzkav Sniper Rifle Battery (8 cap)\n
Headhunters_defend_XT_VH_desc_001=XenoThreat are on the warpath right now. They’ve launched simultaneous attacks on several Headhunters sites and stretched our fighters thin. Got word they’re planning to storm ~mission(Location|Address) next, and we can’t get anyone there to defend it. \n\nI’m looking to pay someone to pull together a crew, gather supplies, and mount a strong defense for us. Gonna be honest with you, this is shaping up to be a hell of a fight. Xenos are sending some of their most experienced forces there. Not much else I can say except that they’ll probably stagger the arrival of their forces, wipe them all out and you’ll be paid handsomely. \n\nThink you can rise to the occasion?  \n\n-Stows\n\n<EM4>Potential Blueprints</EM4>\n- Atzkav Sniper Rifle\n- Atzkav "Igniter" Sniper Rifle\n- Atzkav "Mirage" Sniper Rifle\n- Calico Arms Tactical\n- Calico Core Tactical\n- Calico Legs Tactical\n- Calico Helmet Tactical\n- Atzkav Sniper Rifle Battery (8 cap)\n
headhunters_eliminateall_cfp_M_desc_001=Word came down from the Judge that we're to hit ~mission(Location|Address). It's owned by CFP and security there have been less than hospitable to some of the locals, so they gotta go.\n\nThey may talk a big game about bringing security, but they got guns and are more than happy to use 'em.\n\nStows out.\n\n<EM4>Potential Blueprints</EM4>\n- Atzkav Sniper Rifle\n- Atzkav "Igniter" Sniper Rifle\n- Atzkav "Mirage" Sniper Rifle\n- Calico Arms Tactical\n- Calico Core Tactical\n- Calico Legs Tactical\n- Calico Helmet Tactical\n- Atzkav Sniper Rifle Battery (8 cap)\n
headhunters_eliminateall_cfp_E_desc_001=Need someone to sweep ~mission(Location|Address). CFP security forces seized the outpost from a group of locals that'd been there for years. Beat the hell out of 'em from what I heard, so they came to Headhunters asking for revenge. \n\nNeed it done fast and clean. \n\nStows out.\n\n<EM4>Potential Blueprints</EM4>\n- Atzkav Sniper Rifle\n- Atzkav "Igniter" Sniper Rifle\n- Atzkav "Mirage" Sniper Rifle\n- Calico Arms Tactical\n- Calico Core Tactical\n- Calico Legs Tactical\n- Calico Helmet Tactical\n- Atzkav Sniper Rifle Battery (8 cap)\n
headhunters_eliminateall_XT_derelicts_desc_01=One of our Judges caught wind of XenoThreat trying to move in on our territory. Seems like they’re trying to take over ~mission(Location|Address). We don’t want to let those psychos get any more of a foothold in system than they already have, so we’re putting some creds on the line to get ‘em to back off.\n\nWe want you to come down on them hard. Don’t let up till the whole place is a graveyard. We’ll send your payment once the bodies are ready to bury.\n\n- Stows out.\n\n<EM4>Potential Blueprints</EM4>\n- Atzkav Sniper Rifle\n- Atzkav "Igniter" Sniper Rifle\n- Atzkav "Mirage" Sniper Rifle\n- Calico Arms Tactical\n- Calico Core Tactical\n- Calico Legs Tactical\n- Calico Helmet Tactical\n- Atzkav Sniper Rifle Battery (8 cap)\n
headhunters_EliminateAll_XenoThreat_H_desc_001=One of our people stumbled across a group of XenoThreat hiding out over near ~mission(Location|Address). Not sure if they're dug in or just passing through, but we want to hit them before they move.\n\nMaybe bring some people if you got 'em because XenoThreat don't tend to go down easy. Get there and remind them who the power is in this system.\n\nStows out.\n\n<EM4>Potential Blueprints</EM4>\n- Atzkav Sniper Rifle\n- Atzkav "Igniter" Sniper Rifle\n- Atzkav "Mirage" Sniper Rifle\n- Calico Arms Tactical\n- Calico Core Tactical\n- Calico Legs Tactical\n- Calico Helmet Tactical\n- Atzkav Sniper Rifle Battery (8 cap)\n
headhunters_eliminateall_base_Generic_E_desc_001=So here's the deal, we got some small time dirtbags who think they're hotshots running out of a base near ~mission(Location|Address). I don't know what toxic shit they're drinking but they thought it'd be a good idea to step to some Headhunter Clips. Killed one, injured three more. So I'm looking to send someone there to blast their ambition right out of their skulls.\n\nHead over and get it done. You'll get a nice bump of creds for it.\n\n- Stows\n<EM4>Potential Blueprints</EM4>\n<EM4>[Regional Variants] example locations: Pyro I, PYR1 L1, PYR1 L2</EM4>\n- Atzkav Sniper Rifle\n- Atzkav "Igniter" Sniper Rifle\n- Atzkav "Mirage" Sniper Rifle\n- Calico Arms Tactical\n- Calico Core Tactical\n- Calico Legs Tactical\n- Calico Helmet Tactical\n- Atzkav Sniper Rifle Battery (8 cap)\n\n<EM4>[Regional Variants] example locations: Pyro IV, Pyro V, Ignis</EM4>\n- Yubarev Pistol\n- Yubarev "Mirage" Pistol\n- Yubarev "Igniter" Pistol\n- DustUp Arms Tactical\n- DustUp Core Tactical\n- DustUp Legs Tactical\n- DustUp Helmet Tactical\n- Yubarev Pistol Battery (10 cap)\n
headhunters_eliminateall_outpost_desc_01=Some assholes are refusing to pay us what we’re owed. Problem is, these idiots are bragging about it. Had they kept it quiet, we could’ve taken care of this more surgically, but now we need to send a message.\n\nThe fools are operating from ~mission(Location|Address). We need them all gone. Make it as loud as you can. We’ll send your payment once everyone’s taken care of.\n\n- Stows out.\n\n<EM4>Potential Blueprints</EM4>\n- Yubarev Pistol\n- Yubarev "Mirage" Pistol\n- Yubarev "Igniter" Pistol\n- DustUp Arms Tactical\n- DustUp Core Tactical\n- DustUp Legs Tactical\n- DustUp Helmet Tactical\n- Yubarev Pistol Battery (10 cap)\n
headhunters_eliminateall_xt_desc_001=It's sad to say but we lost one of our outposts to XenoThreat. Appalling if you ask me, but that's why we're looking for someone who's got the time and ammunition to take it back.\n\nIf that's you, head over to ~mission(Location|Address) and take it back.\n\nStows out.\n\n<EM4>Potential Blueprints</EM4>\n- Yubarev Pistol\n- Yubarev "Mirage" Pistol\n- Yubarev "Igniter" Pistol\n- DustUp Arms Tactical\n- DustUp Core Tactical\n- DustUp Legs Tactical\n- DustUp Helmet Tactical\n- Yubarev Pistol Battery (10 cap)\n
headhunters_eliminateall_cfp_desc_001=Here's the deal. Some of those mercs that CFP hired as security went and shot up some Headhunters that were just moving through the system. They weren't even doing anything, just flying.\n\nAnyway, we tracked them back to ~mission(Location|Address) and want to dish out some payback. Grab your gear and be our weapon, we'll make it worth your while.\n\n- Stows\n\n<EM4>Potential Blueprints</EM4>\n- Yubarev Pistol\n- Yubarev "Mirage" Pistol\n- Yubarev "Igniter" Pistol\n- DustUp Arms Tactical\n- DustUp Core Tactical\n- DustUp Legs Tactical\n- DustUp Helmet Tactical\n- Yubarev Pistol Battery (10 cap)\n
headhunters_defend_xt_desc_001=Those XenoThreat punks launched an attack against ~mission(Location|Address) so we're looking for people to go fend them off. \n\nGet out there and waste every XenoThreat you see.\n\nStows out.\n\n<EM4>Potential Blueprints</EM4>\n- Yubarev Pistol\n- Yubarev "Mirage" Pistol\n- Yubarev "Igniter" Pistol\n- DustUp Arms Tactical\n- DustUp Core Tactical\n- DustUp Legs Tactical\n- DustUp Helmet Tactical\n- Yubarev Pistol Battery (10 cap)\n
headhunters_ChainElimAll_AttackCFP_E_desc_001=Looking for anyone with an itchy trigger finger. We're looking to move against some CFP at  ~mission(Location|Address) and take it for ourselves. You gotta play this smart though. There are a bunch of satellite outposts around the main one and all of 'em got security, so you should take out each of these before you take the main base.\n\nBut hey, if you wanna jump right in the deep end and fight off all the reinforcements, that's on you. As long as you get it done.\n\nStows out.\n\n<EM4>Potential Blueprints</EM4>\n- Yubarev Pistol\n- Yubarev "Mirage" Pistol\n- Yubarev "Igniter" Pistol\n- DustUp Arms Tactical\n- DustUp Core Tactical\n- DustUp Legs Tactical\n- DustUp Helmet Tactical\n- Yubarev Pistol Battery (10 cap)\n
headhunters_ChainElimAll_AttackGen_E_desc_001=Looking for some hitters to go drop some violence on some local dipshits who've been pulling jobs in the system against Headhunters. We tried reaching out to explain the error of their ways, but they shot our messenger, so now we go with option B.\n\nYou'll find them holed up near ~mission(Location|Address). Go there and repaint the walls with their blood.\n\nHave fun.\n\nStows out.\n\n<EM4>Potential Blueprints</EM4>\n- Yubarev Pistol\n- Yubarev "Mirage" Pistol\n- Yubarev "Igniter" Pistol\n- DustUp Arms Tactical\n- DustUp Core Tactical\n- DustUp Legs Tactical\n- DustUp Helmet Tactical\n- Yubarev Pistol Battery (10 cap)\n
headhunters_ChainElimAll_1C_AttackXT_M_desc_001=Just got clearance from my Judge to start banging back against XenoThreat. Been eyeballing some spots under their control near ~mission(Location|Address).\n\nI'll give you the targets to hit, you kill everyone you find. Hell, I'd love to go myself, sounds like fun.\n\n-Stows\n\n<EM4>Potential Blueprints</EM4>\n- Atzkav Sniper Rifle\n- Atzkav "Igniter" Sniper Rifle\n- Atzkav "Mirage" Sniper Rifle\n- Calico Arms Tactical\n- Calico Core Tactical\n- Calico Legs Tactical\n- Calico Helmet Tactical\n- Atzkav Sniper Rifle Battery (8 cap)\n
headhunters_ChainElimAll_1C_AttackCFP_E_desc_001=Been getting word that CFP security have been getting a little more aggressive and started pushing people out of the homes they've built out of the scrap in the system and they want payback, so they came to us.\n\nHead out to ~mission(Location|Address) and clear out the CFP there. Should be pretty cut and dry with a nice payday.\n\nStows out.\n\n<EM4>Potential Blueprints</EM4>\n- Atzkav Sniper Rifle\n- Atzkav "Igniter" Sniper Rifle\n- Atzkav "Mirage" Sniper Rifle\n- Calico Arms Tactical\n- Calico Core Tactical\n- Calico Legs Tactical\n- Calico Helmet Tactical\n- Atzkav Sniper Rifle Battery (8 cap)\n
headhunters_ChainElimAll_1C_ElimSpec_AttackCFP_M_desc_001=We've been trying to play nice with these Citizens for Prosperity people, but they've made it abundantly clear that we don't have a place in their 'safe system.' Their use of mercs for security have been causing all kinds of unreasonable violence like when this asshole ~mission(TargetName) opened fire on a group of settlers to drive them away from an outpost they'd been eyeing. So now the gloves are coming off.\n\nI need some hard workers to go hit ~mission(Location|Address) and take out ~mission(TargetName|Last). Odds are, they'll stay hidden until you prove you're enough of a threat, so make sure you do some damage.\n\nStows out.\n\n<EM4>Potential Blueprints</EM4>\n- Atzkav Sniper Rifle\n- Atzkav "Igniter" Sniper Rifle\n- Atzkav "Mirage" Sniper Rifle\n- Calico Arms Tactical\n- Calico Core Tactical\n- Calico Legs Tactical\n- Calico Helmet Tactical\n- Atzkav Sniper Rifle Battery (8 cap)\n
headhunters_ChainElimAll_2C_ElimSpec_AttackCFP_H_desc_001=Got word from my Judge that we're to take back some of the outposts that CFP have taken over. They're a little pissed that CFP's getting as much of a foothold in the system as they are and think it's making the Headhunters look weak.\n\nFound a couple candidates near ~mission(Location|Address) that could use a sweep. Icing on the cake is that the head of security there is ~mission(TargetName). Not sure if you've heard of 'em, but they shot up a handful of Clips last month, so it's a win-win. Get some territory back and punch out someone who could really stand to get got.\n\nStows out.\n\n<EM4>Potential Blueprints</EM4>\n- Atzkav Sniper Rifle\n- Atzkav "Igniter" Sniper Rifle\n- Atzkav "Mirage" Sniper Rifle\n- Calico Arms Tactical\n- Calico Core Tactical\n- Calico Legs Tactical\n- Calico Helmet Tactical\n- Atzkav Sniper Rifle Battery (8 cap)\n
headhunters_ChainElimAll_3C_ElimSpec_AttackCFP_VH_desc_001=Got a big one here. We need a team to head out to ~mission(Location|Address). Word is CFP are dug in at three different clusters in the area. Our judge wants them all cleared out. Seems one of their mercs, a real mean skag named ~mission(TargetName), is holed up at one of them. We want you to go there, clear them all out and take out ~mission(TargetName|Last).\n\nGet yourself a nice little payday in the process.\n\nStows out.\n\n<EM4>Potential Blueprints</EM4>\n- Atzkav Sniper Rifle\n- Atzkav "Igniter" Sniper Rifle\n- Atzkav "Mirage" Sniper Rifle\n- Calico Arms Tactical\n- Calico Core Tactical\n- Calico Legs Tactical\n- Calico Helmet Tactical\n- Atzkav Sniper Rifle Battery (8 cap)\n
headhunters_ChainElimAll_2C_ElimSpec_AttackXT_H_desc_001=Need some good soldiers with a taste for violence to hit some XenoThreat hideouts located around ~mission(Location|Address). I'll get you the specifics if you're down, but you'll have to wipe out two separate clusters of hideouts. \n\nWe've also gotten word that ~mission(TargetName) is lurking around down there. If you take out enough XenoThreat dirtbags, they'll pop they're head up. \n\nWhen they do, put a round in it.\n\nStows out.\n\n<EM4>Potential Blueprints</EM4>\n- Atzkav Sniper Rifle\n- Atzkav "Igniter" Sniper Rifle\n- Atzkav "Mirage" Sniper Rifle\n- Calico Arms Tactical\n- Calico Core Tactical\n- Calico Legs Tactical\n- Calico Helmet Tactical\n- Atzkav Sniper Rifle Battery (8 cap)\n
headhunters_ChainElimAll_3C_ElimSpec_AttackXT_VH_desc_001=Got a juicy assignment for any big-time enforcers who want to clear a big payday. Over at ~mission(Location|Address) we got some XenoThreat turf run by a real bastard named ~mission(TargetName). Now if you've been in the system long enough, you've probably either heard of ~mission(TargetName|Last) or at least seen their work. Skag has a tendency to leaves bodies wherever they go.\n\nAnyway, Judge wants this area swept clean, that means you gotta hit all three clusters and kill every XenoThreat dirt you find. Kill enough and ~mission(TargetName|Last) won't be able to hide.\n\nTake them all out and have one on us.\n\nStows out.\n\n<EM4>Potential Blueprints</EM4>\n- Atzkav Sniper Rifle\n- Atzkav "Igniter" Sniper Rifle\n- Atzkav "Mirage" Sniper Rifle\n- Calico Arms Tactical\n- Calico Core Tactical\n- Calico Legs Tactical\n- Calico Helmet Tactical\n- Atzkav Sniper Rifle Battery (8 cap)\n
headhunters_ChainElimAll_Boss_XenoThreat_VH_desc_001=These XenoThreat assholes are like aloprats. Every time you thing you wipe them out, they just pop back up again. They seem to be back to their usual shit and trying to put together something big. No idea what, but we've been cleared to stop it before it starts.\n\nA group of XenoThreat biggies are supposedly meeting at ~mission(Location|Address) to plan or just rage or whatever it is they do, but we're gonna bust it up. Or you are.\n\nHead over there and wipe out everyone you find. Sure enough I'm sure the biggies will jump into the fight. That's what they always do.\n\nThis'll be a tough one. As much as I hate XenoThreat, they're damn good in a fight, so watch yourself and bring help if you can.\n\nStows out.\n<EM4>Potential Blueprints</EM4>\n<EM4>[Regional Variants] example locations: Pyro I, PYR1 L1, PYR1 L2</EM4>\n- Atzkav Sniper Rifle\n- Atzkav "Igniter" Sniper Rifle\n- Atzkav "Mirage" Sniper Rifle\n- Calico Arms Tactical\n- Calico Core Tactical\n- Calico Legs Tactical\n- Calico Helmet Tactical\n- Atzkav Sniper Rifle Battery (8 cap)\n\n<EM4>[Regional Variants] example locations: Pyro IV, Pyro V, Ignis</EM4>\n- Yubarev Pistol\n- Yubarev "Mirage" Pistol\n- Yubarev "Igniter" Pistol\n- DustUp Arms Tactical\n- DustUp Core Tactical\n- DustUp Legs Tactical\n- DustUp Helmet Tactical\n- Yubarev Pistol Battery (10 cap)\n
headhunters_EliminateSpecific_Asteroid_Generic_M_desc_001=Need someone taken care of. They're holed up near ~mission(Location|Address). Not sure if you care who they are, but their name's ~mission(TargetName). Not much to tell, local thug who killed someone who was connected.\n\nThey've been on the run, so they're gonna be skittish. I'd approach with caution.\n\nStows out.\n\n<EM4>Potential Blueprints</EM4>\n- Ravager-212 Twin Shotgun\n- Ripper "Sunblock" SMG\n- Dust Devil Armor Arms\n- Dust Devil Armor Core\n- Dust Devil Armor Legs\n- Manticore Helmet\n- Ravager-212 Twin Shotgun Magazine (16 cap)\n- Deadrig Shotgun Magazine (8 cap)\n
headhunters_EliminateSpecific_Generic_M_desc_001=Got a crew that's been hitting Headhunter ships lately. Their leader's a real piece of work named ~mission(TargetName). We've tracked them to  ~mission(Location|Address), so we're looking for someone to put them down for good.\n\nThis group likes to fight, but shouldn't be a problem for someone like you. \n\nGet over there and get it done.\n\nStows out.\n\n<EM4>Potential Blueprints</EM4>\n- Scalpel Sniper Rifle\n- Coda Pistol\n- Coda "Nighthawk" Pistol\n- Coda "Big Boss" Pistol\n- Morozov-SH Arms\n- Morozov-SH Core\n- Morozov-SH Legs\n- Morozov-SH Helmet\n- Scalpel Sniper Rifle Magazine (12 cap)\n- Coda Pistol Magazine (6 cap)\n
headhunters_EliminateSpecific_CFP_M_desc_001=Need an available trigger to take down a target in a CFP outpost. They're a real piece of work named ~mission(TargetName). Old school merc filled with lead-pipe cruelty. \n\nHeard they're posted over at ~mission(Location|Address). Swing by and take them out. Try not to cause too much damage. They're the target, not anyone else.\n\nStows out.\n<EM4>Potential Blueprints</EM4>\n<EM4>[Regional Variants] example locations: Pyro I, PYR1 L1, PYR1 L2</EM4>\n- Scalpel Sniper Rifle\n- Coda Pistol\n- Coda "Nighthawk" Pistol\n- Coda "Big Boss" Pistol\n- Morozov-SH Arms\n- Morozov-SH Core\n- Morozov-SH Legs\n- Morozov-SH Helmet\n- Scalpel Sniper Rifle Magazine (12 cap)\n- Coda Pistol Magazine (6 cap)\n\n<EM4>[Regional Variants] example locations: Pyro IV, Pyro V, Ignis</EM4>\n- Devastator Shotgun\n- Devastator "Warhawk" Shotgun\n- Devastator "Midnight" Shotgun\n- Morozov-SH Core Thule\n- Morozov-SH Arms Thule\n- Morozov-SH Legs Thule\n- Morozov-SH Helmet Thule\n- Devastator Shotgun Battery (12 cap)\n
headhunters_EliminateSpecific_Generic_VH_desc_001=Word's come down through my bosses that we're settling old debts. I've got an open line on this old-time hitter named ~mission(TargetName) who's racked up a hefty kill list. We caught wind that they were hiding out with some people over at ~mission(Location|Address) who aren't the biggest fans of us, so they probably won't take kindly to you. ~mission(TargetName|Last) is the target here, but you might have to mix it up with them.\n\nAgain, whenever we've tried to take out ~mission(TargetName|Last), they've killed their killer. I feel like you'll fare better, but I'd bring backup if you got it.\n\nGood luck.\n\n-Stows\n\n<EM4>Potential Blueprints</EM4>\n- Scalpel Sniper Rifle\n- Coda Pistol\n- Coda "Nighthawk" Pistol\n- Coda "Big Boss" Pistol\n- Morozov-SH Arms\n- Morozov-SH Core\n- Morozov-SH Legs\n- Morozov-SH Helmet\n- Scalpel Sniper Rifle Magazine (12 cap)\n- Coda Pistol Magazine (6 cap)\n
headhunters_EliminateSpecific_Generic_E_desc_001=Looking for any hitters available for a quick gig. Over at ~mission(Location|Address), they're getting hit by some geniuses led by ~mission(TargetName). We've tussled against ~mission(TargetName|Last) in the past so it's no surprise they haven't wised up. \n\nWe want you to head there and take them down. Kill whoever you like, but ~mission(TargetName|Last) should be your focus.\n\nStows out.\n\n<EM4>Potential Blueprints</EM4>\n- Devastator Shotgun\n- Devastator "Warhawk" Shotgun\n- Devastator "Midnight" Shotgun\n- Morozov-SH Core Thule\n- Morozov-SH Arms Thule\n- Morozov-SH Legs Thule\n- Morozov-SH Helmet Thule\n- Devastator Shotgun Battery (12 cap)\n
headhunters_EliminateSpecific_Defector_desc_001=This shit saddens me. Not sure if you've ever crossed paths with ~mission(TargetName) in your dealings with us. Thought they were a real good one. Been with the Headhunters for years, but something must have happened because they went running to CFP for protection. Sold out some of our brothers and sisters along the way.\n\nAll the Judges are furious and wants blood. That's where you come in. Go to ~mission(Location|Address), find ~mission(TargetName|Last), and kill them.\n\nDoesn't have to be anything fancy. Just want the result.\n\nDamn shame.\n\nStows out.\n\n<EM4>Potential Blueprints</EM4>\n- Devastator Shotgun\n- Devastator "Warhawk" Shotgun\n- Devastator "Midnight" Shotgun\n- Morozov-SH Core Thule\n- Morozov-SH Arms Thule\n- Morozov-SH Legs Thule\n- Morozov-SH Helmet Thule\n- Devastator Shotgun Battery (12 cap)\n
headhunters_EliminateSpecific_XenoThreat_desc_001=Got a line on a XenoThreat that's been a pain in the ass. Not sure if you've heard the name, but ~mission(TargetName) is a scumbag even by XenoThreat standards. Vicious, sadistic, and a prick to boot. We want someone to punch their number. You up for it?\n\nLast word was that they were somewhere around ~mission(Location|Address). Head there and take 'em out. Pretty simple.\n\nStows out.\n\n<EM4>Potential Blueprints</EM4>\n- Devastator Shotgun\n- Devastator "Warhawk" Shotgun\n- Devastator "Midnight" Shotgun\n- Morozov-SH Core Thule\n- Morozov-SH Arms Thule\n- Morozov-SH Legs Thule\n- Morozov-SH Helmet Thule\n- Devastator Shotgun Battery (12 cap)\n
headhunters_EliminateSpecific_CFP_E_desc_001=My boss is looking for an available hitter. Headhunters are looking to retake ~mission(Location|Address). The CFP Mercs there have been digging in for a long fight. Look, we don't want to kill anyone we don't have to, so we're looking into other options.\n\nSecurity there's being run by ~mission(TargetName) and my Judge thinks that if they're taken out, the rest'll scatter. Shedding a little blood's better than a lot, right?\n\n-Stows\n\n<EM4>Potential Blueprints</EM4>\n- Scalpel Sniper Rifle\n- Coda Pistol\n- Coda "Nighthawk" Pistol\n- Coda "Big Boss" Pistol\n- Morozov-SH Arms\n- Morozov-SH Core\n- Morozov-SH Legs\n- Morozov-SH Helmet\n- Scalpel Sniper Rifle Magazine (12 cap)\n- Coda Pistol Magazine (6 cap)\n
headhunters_EliminateSpecific_XenoThreat_VH_desc_001=Here's the deal, we just got word that a XenoThreat power player named ~mission(TargetName) just came out of hiding and was spotted at ~mission(Location|Address). \n\nHeadhunters have been hungry to put this asshole in the ground for months, so we launched an assault against the outpost, but the Judge wants to make sure ~mission(TargetName|Last) doesn't slip away, so they want to use you as insurance.\n\nThis'll be a tough kill in the middle of a warzone, but we'll pay out if you pull it off.\n\nStows out.\n\n<EM4>Potential Blueprints</EM4>\n- Scalpel Sniper Rifle\n- Coda Pistol\n- Coda "Nighthawk" Pistol\n- Coda "Big Boss" Pistol\n- Morozov-SH Arms\n- Morozov-SH Core\n- Morozov-SH Legs\n- Morozov-SH Helmet\n- Scalpel Sniper Rifle Magazine (12 cap)\n- Coda Pistol Magazine (6 cap)\n
headhunters_EliminateSpecific_XenoThreat_H_desc_001=Headhunters just rallied up a crew to go hit ~mission(Location|Address) and wipe out the XenoThreat there, but I'm looking to add some extra insurance. \n\nSee there's this heavy hitter there named ~mission(TargetName) who's up in the XenoThreat command structure and we want them taken out. Every other one you kill is gravy, but they're your prime target.\n\n-Stows\n\n<EM4>Potential Blueprints</EM4>\n- Scalpel Sniper Rifle\n- Coda Pistol\n- Coda "Nighthawk" Pistol\n- Coda "Big Boss" Pistol\n- Morozov-SH Arms\n- Morozov-SH Core\n- Morozov-SH Legs\n- Morozov-SH Helmet\n- Scalpel Sniper Rifle Magazine (12 cap)\n- Coda Pistol Magazine (6 cap)\n
headhunters_EliminateSpecific_Asteroid_Generic_VE_desc_001=Got word of crew that's been pulling jobs and building a rep for themselves. Since they've said they don't want anything to do with Headhunters, we're looking to break 'em apart before they become a problem. Their leader is some punk named ~mission(TargetName) and we figure if they met the wrong end of a bullet, the rest of them would break apart.\n\nWe're told you can find ~mission(TargetName|Last) around ~mission(Location|Address). Head over and take care of it.\n\nThey shouldn't pose much of a problem to a pro like you.\n\nStows out.\n<EM4>Potential Blueprints</EM4>\n<EM4>[Regional Variants] example locations: Pyro I, PYR1 L1, PYR1 L2</EM4>\n- Scalpel Sniper Rifle\n- Coda Pistol\n- Coda "Nighthawk" Pistol\n- Coda "Big Boss" Pistol\n- Morozov-SH Arms\n- Morozov-SH Core\n- Morozov-SH Legs\n- Morozov-SH Helmet\n- Scalpel Sniper Rifle Magazine (12 cap)\n- Coda Pistol Magazine (6 cap)\n\n<EM4>[Regional Variants] example locations: Pyro IV, Pyro V, Ignis</EM4>\n- Devastator Shotgun\n- Devastator "Warhawk" Shotgun\n- Devastator "Midnight" Shotgun\n- Morozov-SH Core Thule\n- Morozov-SH Arms Thule\n- Morozov-SH Legs Thule\n- Morozov-SH Helmet Thule\n- Devastator Shotgun Battery (12 cap)\n
headhunters_EliminateSpecific_CFP_H_desc_001=Headhunters are launching an attack near ~mission(Location|Address). This ex-Marine asshole named ~mission(TargetName) has been sending their mercs to clear out nearby encampments if they don't surrender their weapons.\n\nWhile all the security have been greenlit, ~mission(TargetName|Last) has been singled out. In their last raid, they beat a squatter to death for talking back. Turns out that squatter was the cousin of one of our Clips, so they're paying extra to make sure justice is done.\n\nWatch yourself though, ~mission(TargetName|Last) may be a scumbag who has this coming, they're still ex-military so they won't be easy to take down.\n\n-Stows\n\n<EM4>Potential Blueprints</EM4>\n- Devastator Shotgun\n- Devastator "Warhawk" Shotgun\n- Devastator "Midnight" Shotgun\n- Morozov-SH Core Thule\n- Morozov-SH Arms Thule\n- Morozov-SH Legs Thule\n- Morozov-SH Helmet Thule\n- Devastator Shotgun Battery (12 cap)\n
vaughn_assassination_FPS_UGF_illegal_desc_001=They say there is no honor among thieves. Today, it seems, you're targeting one of your own. \n\nPlease head to ~mission(Location|Address) and kill ~mission(TargetName). What you do with the others there is entirely up to you.\n\nEarnestly,\nVaughn\n\n\n<EM4>Potential Blueprints</EM4>\n- Killshot Rifle\n- Deadrig Shotgun\n- Overlord Arms Supernova\n- Overlord Core Supernova\n- Overlord Legs Supernova\n- Overlord Helmet Supernova\n- Piecemeal Armor Arms\n- Piecemeal Armor Core\n- Piecemeal Armor Legs\n- Badami Helmet\n- Killshot Rifle Magazine (45 Cap)\n- Deadrig Shotgun Magazine (8 cap)\n
Vaughn_EliminateSpecific_FPS_Rockcracker_Power_desc_001=A request has made its way to my desk regarding the untimely end of one ~mission(TargetName), a member of the Claw Salamander who is currently scuttling around an old QV Breaker Station. \n\nIt is highly likely that you will find them at ~mission(Location|Address).  Be mindful though that with a station this large it may take a bit of searching to track them down. \n\nHope you enjoy your time in Nyx,\nVaughn\n\n<EM4>Potential Blueprints</EM4>\n- R97 Shotgun\n- Monde Arms\n- Monde Core\n- Monde Legs\n- Monde Helmet\n- Monde Arms Hiro\n- Monde Core Hiro\n- Monde Legs Hiro\n- Monde Helmet Hiro\n- R97 Shotgun Magazine (18 cap)\n
Vaughn_EliminateSpecific_FPS_Rockcracker_Maintenance_desc_001=I've been having a hard time tracking this target down. They're part of a gang known as the Claw Salamanders who tend to be quite itinerate. However, it seems the group has been trying to get an old QV Breaker Station operational again and I think this just may be the chance to take out ~mission(TargetName) once and for all. \n\nStart your search at ~mission(Location|Address).  These stations can apparently be quiet cavernous at  times so it may take a bit of effort to locate the target once you're on site.\n\nHowever, I have all the confidence in your abilities,\nVaughn\n\n<EM4>Potential Blueprints</EM4>\n- R97 Shotgun\n- Monde Arms\n- Monde Core\n- Monde Legs\n- Monde Helmet\n- Monde Arms Hiro\n- Monde Core Hiro\n- Monde Legs Hiro\n- Monde Helmet Hiro\n- R97 Shotgun Magazine (18 cap)\n
Vaughn_EliminateSpecific_FPS_Rockcracker_Warehouse_desc_001=There is a member of the Nyx gang the Claw Salamanders, ~mission(TargetName), who has made it on to my naughty list. They had been on the run for quite awhile, but just recently popped back up at an old mining station in the Keeger Belt. Our lucky day shall be their last.  \n\nWord is that you can find them at ~mission(Location|Address).  Unfortunately, there is a strong chance you may have to do some repairs to the station itself before you can gain access to that particular area.\n\nBut I'm sure you're more than up to the challenge.\n\nSincerely,\nVaughn\n\n<EM4>Potential Blueprints</EM4>\n- R97 Shotgun\n- Monde Arms\n- Monde Core\n- Monde Legs\n- Monde Helmet\n- Monde Arms Hiro\n- Monde Core Hiro\n- Monde Legs Hiro\n- Monde Helmet Hiro\n- R97 Shotgun Magazine (18 cap)\n
vaughn_assassination_FPS_UGF_legal_boss_desc_001=A senior security official by the name of ~mission(TargetName) is about to have their long career come to a very violent and sudden end. While they are currently at ~mission(Location|Address), they will not be easy to get to. I fear that a bit of work will be required to draw them out.  \n\nI recommend killing enough of their underlings that they will be forced to face you personally. Of course, once they do decide to finally show their face, it should be a rather straightforward matter. \n\nEarnestly,\nVaughn\n\n\n<EM4>Potential Blueprints</EM4>\n- Pulverizer LMG\n- Tripledown Pistol\n- Citadel Arms Base\n- Citadel Legs Base\n- Citadel Core Base\n- Fortifier Helmet Base\n- Carnifex Armor Core\n- Carnifex Armor Legs\n- Pulverizer LMG Magazine (120 Cap)\n- Tripledown Pistol Magazine (12 Cap)\n
vaughn_assassination_FPS_UGF_illegal_boss_desc_001=I am not sure if you’re acquainted with ~mission(Location|Address), but ~mission(TargetName) is the one who calls the shots there. I need them eliminated.\n\nThat is easier said then done, I'm afraid. They are notoriously reluctant to see to matters personally, preferring their underlings to handle the dirty work. That said, eliminate enough of the underlings and they will have no choice but to deal with you themselves.\n\nEarnestly,\nVaughn\n\n\n<EM4>Potential Blueprints</EM4>\n- Pulverizer LMG\n- Tripledown Pistol\n- Citadel Arms Base\n- Citadel Legs Base\n- Citadel Core Base\n- Fortifier Helmet Base\n- Carnifex Armor Core\n- Carnifex Armor Legs\n- Pulverizer LMG Magazine (120 Cap)\n- Tripledown Pistol Magazine (12 Cap)\n
bhg_bounty_desc_ASD_Research_001=--------------------------------------------------------\n----------------- BOUNTY CONTRACT -----------------\n--------------------------------------------------------\n\nBOUNTY HUNTERS GUILD\nPROCESSING & DISTRIBUTION\n\nThe Bounty Hunters Guild has authorized an official bounty.\n\nNAME: ~mission(TargetName) \nSYSTEM: Stanton\nRISK ASSESSMENT: Medium\nLAST KNOWN LOCATION:  ~mission(Location|Address)\nKNOWN AFFILIATIONS: <None>\nNOTES: We have tracked this bounty target to the <EM4>Research wing</EM4> of an abandoned Associated Science and Development facility. While shuttered, various scavengers and other unsavory types are known to frequent the area.\n\nThe facility itself might also pose a risk as the nature of the research being conducted there is unknown. Be on the lookout for potential environmental hazards while in pursuit of the target.\n\n\nBOUNTY HUNTERS GUILD\nIn Pursuit of Justice\n\nThe Bounty Hunters Guild is a security service sanctioned by the Mercenary Guild and authorized to operate in both the UEE and beyond in accordance with Xenotrade Authority Acts.\n\n<EM4>Potential Blueprints</EM4>\n- Palatino Arms Metropolis\n- Palatino Core Metropolis\n- Palatino Legs Metropolis\n- Palatino Helmet Metropolis\n- Palatino Arms Daystar\n- Palatino Core Daystar\n- Palatino Legs Sunstone\n- Palatino Helmet Daystar\n
bhg_bounty_desc_ASD_Engineering_001=--------------------------------------------------------\n----------------- BOUNTY CONTRACT -----------------\n--------------------------------------------------------\n\nBOUNTY HUNTERS GUILD\nPROCESSING & DISTRIBUTION\n\nThe Bounty Hunters Guild has authorized an official bounty.\n\nNAME: ~mission(TargetName) \nSYSTEM: Stanton\nRISK ASSESSMENT: Medium\nLAST KNOWN LOCATION:  ~mission(Location|Address)\nKNOWN AFFILIATIONS: <None>\nNOTES: We have tracked this bounty target to the <EM4>Engineering wing</EM4> of an abandoned Associated Science and Development research facility. While shuttered, various scavengers and other unsavory types are known to frequent the area.\n\nThe facility itself might also pose a risk as the nature of the research being conducted there is unknown. Be on the lookout for potential environmental hazards while in pursuit of the target.\n\n\nBOUNTY HUNTERS GUILD\nIn Pursuit of Justice\n\nThe Bounty Hunters Guild is a security service sanctioned by the Mercenary Guild and authorized to operate in both the UEE and beyond in accordance with Xenotrade Authority Acts.\n\n<EM4>Potential Blueprints</EM4>\n- Palatino Arms Sunstone\n- Palatino Core Sunstone\n- Palatino Legs Sunstone\n- Palatino Helmet Sunstone\n
