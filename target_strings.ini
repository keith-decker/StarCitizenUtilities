Shubin_Industrial_ShipMining_Stanton_E_Local_Desc_001=POSTING: Purchase Order\nLOCATION: <EM4>~mission(System) </EM4>\n\nTERMS*: \nDue to changes in our sourcing pipeline, Shubin Interstellar is currently looking to purchase a variety of refined materials from independent miners operating in the area. While selling at a trade hub may net you a more competitive price than fulfilling our order, many miners find that strengthening their ties to Shubin to be a wise long-term investment for their career.\n\n~mission(Hint_Location) For a comprehensive list of where to find these minerals, consult <EM4>Mining Fundamentals #2: Where to Mine</EM4> in your mobiGlas Journal. While you're there, feel free to read the first part <EM4>Mining Fundamentals #1: Basic Overview</EM4> if you want a refresher on how to get the materials.\n\nSince this is a purchase order and not a mining contract, you are expected to provide your own equipment, such as a <EM4>~mission(Hint_Tool)</EM4>.\n\nPlease note that in an effort to expedite future use of these materials, <EM4>they must be refined before delivery</EM4>. This can be done at any refinery, the locations of which can be found in your Starmap.\n\nOnce you’re ready to sell us the required refined materials, deposit them in the freight elevator located at <EM4>~mission(Destination|Address)</EM4>.\n\n\n<EM4>Potential Blueprints</EM4>\n- Arclight "Nightstalker" Pistol\n- Aril Arms\n- Aril Core\n- Aril Legs\n- Aril Helmet\n- Arclight "Warhawk" Pistol\n- Arclight Pistol Battery (30 cap)\n
