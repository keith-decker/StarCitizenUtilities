cfp_defendship_VLRT_desc_001=It seems one of the routes that we had thought relatively safe has proven otherwise. Outlaws have attacked one of our pilots over at ~mission(Location|Address) and they won't make it much longer without support. \n\nI'd appreciate it if you could fly there as quickly as possible and help them deal with these attackers.\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Potential Blueprints (Nyx Only)</EM4>\n- R97 Shotgun\n- Monde Arms\n- Monde Core\n- Monde Legs\n- Monde Helmet\n- Monde Arms Hiro\n- Monde Core Hiro\n- Monde Legs Hiro\n- Monde Helmet Hiro\n- R97 Shotgun Magazine (18 cap)\n
cfp_defendship_LRT_desc_001=One of our pilots had just picked up a shipment of supplies near ~mission(Location|Address) when they were attacked by some vicious shipjackers. \n\nWe just received their distress beacon and I'm hoping you can go provide them combat support.\n\nAny assistance you could give would make all the difference.\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Potential Blueprints (Nyx Only)</EM4>\n- R97 Shotgun\n- Monde Arms\n- Monde Core\n- Monde Legs\n- Monde Helmet\n- Monde Arms Hiro\n- Monde Core Hiro\n- Monde Legs Hiro\n- Monde Helmet Hiro\n- R97 Shotgun Magazine (18 cap)\n
cfp_defendship_MRT_desc_001=A Citizens for Prosperity affiliated ship was attempting to deliver some supplies to ~mission(Location|Address) when they were attacked by the recipients who didn't want to pay for their purchase and chose violence instead.\n\nI'll instruct our traders to be more careful about who they deal with in the future, but for now, I would really appreciate you lending them a hand in fighting off these attackers. \n\nAppreciated,\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Potential Blueprints (Nyx Only)</EM4>\n- R97 Shotgun\n- Monde Arms\n- Monde Core\n- Monde Legs\n- Monde Helmet\n- Monde Arms Hiro\n- Monde Core Hiro\n- Monde Legs Hiro\n- Monde Helmet Hiro\n- R97 Shotgun Magazine (18 cap)\n
cfp_defendship_multi_HRT_desc_001=We just received word that a convoy of Citizen for Prosperity affiliated ships have been targeted by outlaws and that our people are in dire need of assistance. \n\nIf you are available, we need combat ready pilots at ~mission(Location|Address) to defend our people. Note that at this dire time, we cannot afford even a single lost ship and expect with your assistance for all of our people make it out alive.\n\nGood luck,\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Potential Blueprints</EM4>\n- R97 Shotgun\n- Monde Arms\n- Monde Core\n- Monde Legs\n- Monde Helmet\n- Monde Arms Hiro\n- Monde Core Hiro\n- Monde Legs Hiro\n- Monde Helmet Hiro\n- R97 Shotgun Magazine (18 cap)\n
cfp_defendship_multi_VHRT_desc_001=A Citizens for Prosperity convoy on a resupply run dropped a distress beacon near <EM4>~mission(Location|Address)</EM4>. They’re not answering any comms, so I assume the situation is serious. That convoy has some skilled pilots, so if they’re not responding then they definitely need the help.\n\nWe’ll compensate you to support that convoy.  \n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n\n<EM4>Potential Blueprints</EM4>\n- R97 Shotgun\n- Monde Arms\n- Monde Core\n- Monde Legs\n- Monde Helmet\n- Monde Arms Hiro\n- Monde Core Hiro\n- Monde Legs Hiro\n- Monde Helmet Hiro\n- R97 Shotgun Magazine (18 cap)\n
cfp_defendship_multi_SRT_desc_001=I’m getting reports that a Citizens for Prosperity convoy carrying vital supplies is currently under attack at <EM4>~mission(Location|Address)</EM4>. It’d be a big blow to our operations if we lost that cargo. \n\nIf you’ve got the combat skills to go up against highly aggressive hostiles, we’re more than willing to pay for your help. \n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n\n<EM4>Potential Blueprints</EM4>\n- R97 Shotgun\n- Monde Arms\n- Monde Core\n- Monde Legs\n- Monde Helmet\n- Monde Arms Hiro\n- Monde Core Hiro\n- Monde Legs Hiro\n- Monde Helmet Hiro\n- R97 Shotgun Magazine (18 cap)\n
cfp_sabotage_servers_M_HH_desc_001=The Headhunters recently attacked one of our transports and were sadly able to get their hands on some secure data. Although the encryption on it is strong, its only a matter of time before they'll be able to access it.\n\nBefore that happens, we need you to go to ~mission(Location|Address) and destroy all traces of the information from their servers.\n\nYou'd really be helping Citizens for Prosperity out if you can pull this off.\n \nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n<EM4>Potential Blueprints</EM4>\n<EM4>[Regional Variants] example locations: Pyro I, PYR1 L1, PYR1 L2</EM4>\n- FS-9 LMG\n- BR-2 Shotgun\n- Gallant Rifle\n- ADP Arms Woodland\n- ADP Core\n- ADP Legs Woodland\n- Balor HCH Helmet\n- ADP-mk4 Arms Woodland\n- ADP-mk4 Legs Woodland\n- ADP-mk4 Core Woodland\n- ADP-mk4 Helmet Woodland\n- FS-9 Magazine (75 cap)\n- BR-2 Shotgun Magazine (12 cap)\n- Gallant Rifle Battery (45 cap)\n\n<EM4>[Regional Variants] example locations: Pyro IV, Pyro V, Ignis</EM4>\n- P6-LR Sniper Rifle\n- A03 Sniper Rifle\n- CBH-3 Helmet Base\n- PAB-1 Arms\n- PAB-1 Core\n- PAB-1 Legs\n- TrueDef-Pro Arms\n- TrueDef-Pro Core Base\n- Argus Helmet\n- TrueDef-Pro Legs\n- A03 Sniper Rifle Magazine (15 cap)\n- P6-LR Magazine (8 cap)\n
cfp_sabotage_generators_M_desc_001=We have gotten word that the outlaws at ~mission(Location|Address) have begun recruiting with the hopes of launching a raid against Citizens for Prosperity. \n\nIn order to deescalate the situation before it gets out of hand, we would like you to disable their power generators and halt their expansion. \n\nPull this off and it could save a lot of lives.\n \nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Potential Blueprints</EM4>\n- FS-9 LMG\n- BR-2 Shotgun\n- Gallant Rifle\n- ADP Arms Woodland\n- ADP Core\n- ADP Legs Woodland\n- Balor HCH Helmet\n- ADP-mk4 Arms Woodland\n- ADP-mk4 Legs Woodland\n- ADP-mk4 Core Woodland\n- ADP-mk4 Helmet Woodland\n- FS-9 Magazine (75 cap)\n- BR-2 Shotgun Magazine (12 cap)\n- Gallant Rifle Battery (45 cap)\n
cfp_sabotage_VH_desc_001=Citizens for Prosperity have been monitoring a very dangerous outlaw group at ~mission(Location|Address) and we believe that they are in midst of planning a major attack which could throw the whole system into upheaval.\n\nIn order to protect all the progress we've made here, we would like you to raid their compound and destroy all the servers housing their plans. \n\nThis should at least provide us with enough of a reprieve for them to reconsider their offensive.\n\nThank you,\n \nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Potential Blueprints</EM4>\n- FS-9 LMG\n- BR-2 Shotgun\n- Gallant Rifle\n- ADP Arms Woodland\n- ADP Core\n- ADP Legs Woodland\n- Balor HCH Helmet\n- ADP-mk4 Arms Woodland\n- ADP-mk4 Legs Woodland\n- ADP-mk4 Core Woodland\n- ADP-mk4 Helmet Woodland\n- FS-9 Magazine (75 cap)\n- BR-2 Shotgun Magazine (12 cap)\n- Gallant Rifle Battery (45 cap)\n
cfp_sabotage_servers_H_XT_desc_001=We got a bit of a problem that I'm hoping you can solve for me. One of our informers has revealed that XenoThreat has been amassing data on Citizens for Prosperity operations throughout the system. \n\nThis information, if used correctly, could put our people at serious risk. The best solution is for you to completely destroy the servers where the data is being stored at ~mission(Location|Address).\n\nWith their trove of information wiped out, it should give our people a fighting chance.\n \nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n<EM4>Potential Blueprints</EM4>\n<EM4>[Regional Variants] example locations: Bloom, PYR3 L1, PYR3 L2</EM4>\n- FS-9 LMG\n- BR-2 Shotgun\n- Gallant Rifle\n- ADP Arms Woodland\n- ADP Core\n- ADP Legs Woodland\n- Balor HCH Helmet\n- ADP-mk4 Arms Woodland\n- ADP-mk4 Legs Woodland\n- ADP-mk4 Core Woodland\n- ADP-mk4 Helmet Woodland\n- FS-9 Magazine (75 cap)\n- BR-2 Shotgun Magazine (12 cap)\n- Gallant Rifle Battery (45 cap)\n\n<EM4>[Regional Variants] example locations: Terminus, PYR6 L1, PYR6 L2</EM4>\n- P6-LR Sniper Rifle\n- A03 Sniper Rifle\n- CBH-3 Helmet Base\n- PAB-1 Arms\n- PAB-1 Core\n- PAB-1 Legs\n- TrueDef-Pro Arms\n- TrueDef-Pro Core Base\n- Argus Helmet\n- TrueDef-Pro Legs\n- A03 Sniper Rifle Magazine (15 cap)\n- P6-LR Magazine (8 cap)\n
cfp_sabotage_generators_VE_desc_001=Following a series of raids against Citizens for Prosperity aligned settlements, we believe we have traced those responsible back to ~mission(Location|Address).\n\nAttacking them directly will pose too great of a risk and most likely encourage aggressive reprisals. Instead, we believe that if their power generators were to be disable it could force them to settle somewhere else.\n\nDo you think you could handle it for us?\n \nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n<EM4>Potential Blueprints</EM4>\n<EM4>[Regional Variants] example locations: Pyro I, PYR1 L1, PYR1 L2</EM4>\n- FS-9 LMG\n- BR-2 Shotgun\n- Gallant Rifle\n- ADP Arms Woodland\n- ADP Core\n- ADP Legs Woodland\n- Balor HCH Helmet\n- ADP-mk4 Arms Woodland\n- ADP-mk4 Legs Woodland\n- ADP-mk4 Core Woodland\n- ADP-mk4 Helmet Woodland\n- FS-9 Magazine (75 cap)\n- BR-2 Shotgun Magazine (12 cap)\n- Gallant Rifle Battery (45 cap)\n\n<EM4>[Regional Variants] example locations: Pyro IV, Pyro V, Ignis</EM4>\n- P6-LR Sniper Rifle\n- A03 Sniper Rifle\n- CBH-3 Helmet Base\n- PAB-1 Arms\n- PAB-1 Core\n- PAB-1 Legs\n- TrueDef-Pro Arms\n- TrueDef-Pro Core Base\n- Argus Helmet\n- TrueDef-Pro Legs\n- A03 Sniper Rifle Magazine (15 cap)\n- P6-LR Magazine (8 cap)\n
cfp_bombingrun_E_desc_001=We've been having escalating issues with the outlaws at ~mission(Location|Address) and can no longer stand by and watch as their aggressive actions hurt our community. \n\nWe are wary of launching a full scale assault, but believe that if their fuel stores are wiped out, it would deter them from further hostile actions. \n\nIf you're able, I'd appreciate you handling the destruction of the fuel personally. A ship capable of launching missiles would probably make the most sense, but I leave that up to you.\n\nThanks,\n \nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n<EM4>Potential Blueprints</EM4>\n<EM4>[Regional Variants] example locations: Pyro I, PYR1 L1, PYR1 L2</EM4>\n- FS-9 LMG\n- BR-2 Shotgun\n- Gallant Rifle\n- ADP Arms Woodland\n- ADP Core\n- ADP Legs Woodland\n- Balor HCH Helmet\n- ADP-mk4 Arms Woodland\n- ADP-mk4 Legs Woodland\n- ADP-mk4 Core Woodland\n- ADP-mk4 Helmet Woodland\n- FS-9 Magazine (75 cap)\n- BR-2 Shotgun Magazine (12 cap)\n- Gallant Rifle Battery (45 cap)\n\n<EM4>[Regional Variants] example locations: Pyro IV, Pyro V, Ignis</EM4>\n- P6-LR Sniper Rifle\n- A03 Sniper Rifle\n- CBH-3 Helmet Base\n- PAB-1 Arms\n- PAB-1 Core\n- PAB-1 Legs\n- TrueDef-Pro Arms\n- TrueDef-Pro Core Base\n- Argus Helmet\n- TrueDef-Pro Legs\n- A03 Sniper Rifle Magazine (15 cap)\n- P6-LR Magazine (8 cap)\n
cfp_sabotage_drugs_M_desc_001=Citizens for Prosperity has been working hard to improve people's lives across the system, but an already difficult task becomes near impossible when drugs get involved. We've recently seen a dealer specifically targeting our most vulnerable and have experienced setbacks across the board. This needs to stop.\n\nWe would like you to go to ~mission(Location|Address) and put a permanent end to their production line.\n\nDo this and we can hopefully get our people back on track. \n \nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n<EM4>Potential Blueprints</EM4>\n<EM4>[Regional Variants] example locations: Pyro I, PYR1 L1, PYR1 L2</EM4>\n- FS-9 LMG\n- BR-2 Shotgun\n- Gallant Rifle\n- ADP Arms Woodland\n- ADP Core\n- ADP Legs Woodland\n- Balor HCH Helmet\n- ADP-mk4 Arms Woodland\n- ADP-mk4 Legs Woodland\n- ADP-mk4 Core Woodland\n- ADP-mk4 Helmet Woodland\n- FS-9 Magazine (75 cap)\n- BR-2 Shotgun Magazine (12 cap)\n- Gallant Rifle Battery (45 cap)\n\n<EM4>[Regional Variants] example locations: Pyro IV, Pyro V, Ignis</EM4>\n- P6-LR Sniper Rifle\n- A03 Sniper Rifle\n- CBH-3 Helmet Base\n- PAB-1 Arms\n- PAB-1 Core\n- PAB-1 Legs\n- TrueDef-Pro Arms\n- TrueDef-Pro Core Base\n- Argus Helmet\n- TrueDef-Pro Legs\n- A03 Sniper Rifle Magazine (15 cap)\n- P6-LR Magazine (8 cap)\n
cfp_sabotage_servers_VH_XT_desc_001=One of the Citizens for Prosperity members who have been serving as a XenoThreat informer has let us know that the data servers located at ~mission(Location|Address) our housing a trove of information vital to the gang's operation. \n\nIf you were able to destroy these servers on our behalf it would be a huge win for the security of the entire system.\n \nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Potential Blueprints</EM4>\n- FS-9 LMG\n- BR-2 Shotgun\n- Gallant Rifle\n- ADP Arms Woodland\n- ADP Core\n- ADP Legs Woodland\n- Balor HCH Helmet\n- ADP-mk4 Arms Woodland\n- ADP-mk4 Legs Woodland\n- ADP-mk4 Core Woodland\n- ADP-mk4 Helmet Woodland\n- FS-9 Magazine (75 cap)\n- BR-2 Shotgun Magazine (12 cap)\n- Gallant Rifle Battery (45 cap)\n
cfp_sabotage_server_elimiatespecific_HH_desc_001=We're just putting the full picture together now, but so far we've learned that a Headhunter by the name of ~mission(TargetName) recently stole some sensitive data that if exposed will be detrimental to Citizens for Prosperity's cause. \n\nWe need to ensure that all traces of the stolen data are eradicated. This means taking out all the Headhunter servers at ~mission(Location|Address) as well as tracking down ~mission(TargetName|Last) to stop them from further disseminating the information.\n\nYour help is much appreciated,\n \nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Potential Blueprints</EM4>\n- P6-LR Sniper Rifle\n- A03 Sniper Rifle\n- CBH-3 Helmet Base\n- PAB-1 Arms\n- PAB-1 Core\n- PAB-1 Legs\n- TrueDef-Pro Arms\n- TrueDef-Pro Core Base\n- Argus Helmet\n- TrueDef-Pro Legs\n- A03 Sniper Rifle Magazine (15 cap)\n- P6-LR Magazine (8 cap)\n
cfp_defend_cave_Generic_desc_001=We received a distress call from ~mission(Location|Address) saying that they're being robbed by a small group of outlaws. ~mission(Location|CaveSize) Though remote, this outpost is a crucial piece of CFP's infrastructure in the area so we need to take it back.\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Potential Blueprints</EM4>\n- Karna Rifle\n- Artimex Arms\n- Artimex Core\n- Artimex Legs\n- Artimex Helmet\n- Karna Rifle Battery (35 cap)\n
cfp_defend-criminals_desc_001=We learned that ~mission(Location|Address) is under threat of attack by outlaws and has asked for assistance. We need someone to protect them and drive away the outlaws. \n\nMake sure you stay close after their initial attack. Too often, outlaws win fights just by sending more bodies than anyone can reasonably defend against, so make sure you fight off any reinforcements before leaving the area. \n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n<EM4>Potential Blueprints</EM4>\n<EM4>[Regional Variants] example locations: Bloom, PYR3 L1, PYR3 L2</EM4>\n- Karna "Fate" Rifle\n- Artimex Core (Modified)\n- Artimex Arms (Modified)\n- Karna Rifle Battery (35 cap)\n\n<EM4>Region outpost_regionab</EM4>\n- Karna Rifle\n- Artimex Arms\n- Artimex Core\n- Artimex Legs\n- Artimex Helmet\n- Karna Rifle Battery (35 cap)\n
cfp_defend_regionshift_desc_001=We've received a distress call from ~mission(Location|Address). A group of unknown assailants have launched an attack. There have been multiple deaths reported and we need to reclaim the outpost.\n\nI know this is far from your current position, but we're desperate to secure the area and get the outpost back and running again.\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n<EM4>Potential Blueprints</EM4>\n<EM4>[Regional Variants] example locations: Terminus, PYR6 L1, PYR6 L2</EM4>\n- Karna "Brimstone" Rifle\n- Artimex Core Lodestone\n- Artimex Arms Lodestone\n- Artimex Legs Lodestone\n- Artimex Helmet Lodestone\n- Karna Rifle Battery (35 cap)\n\n<EM4>[Regional Variants] example locations: Pyro I, PYR1 L1, PYR1 L2</EM4>\n- Karna Rifle\n- Artimex Arms\n- Artimex Core\n- Artimex Legs\n- Artimex Helmet\n- Karna Rifle Battery (35 cap)\n\n<EM4>[Regional Variants] example locations: Pyro IV, Pyro V, Ignis</EM4>\n- Karna Rifle\n- Artimex Core Canuto\n- Artimex Arms Canuto\n- Artimex Legs Canuto\n- Artimex Helmet Canuto\n- Karna Rifle Battery (35 cap)\n
cfp_eliminateall_hh_E_desc_001=Citizens for Prosperity is looking for security personnel to take a former CFP outpost that's currently serving as a hideout for Headhunters to launch attacks throughout the system. \n\nLocated near ~mission(Location|Address), reclaiming this outpost will allow CFP to provide greater support to local efforts to build stability.\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Potential Blueprints</EM4>\n- Karna Rifle\n- Artimex Arms\n- Artimex Core\n- Artimex Legs\n- Artimex Helmet\n- Karna Rifle Battery (35 cap)\n
cfp_eliminateall_XT_E_desc_001=Despite our efforts to promote non-violence, local outlaw groups continue to attack our organization. XenoThreat recently assaulted ~mission(Location|Address) and chased out our volunteers that had been working there.\n\nWe're looking to enlist combat personnel to retake the outpost. Ideally we could work something out to encourage them to move on, but XenoThreat quickly resorts to violence to solve all their issues so there will undoubtedly be a fight.\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Potential Blueprints</EM4>\n- Karna Rifle\n- Artimex Core Canuto\n- Artimex Arms Canuto\n- Artimex Legs Canuto\n- Artimex Helmet Canuto\n- Karna Rifle Battery (35 cap)\n
cfp_eliminateall_fromCFP_hh_M_desc_001=We received an emergency comm from ~mission(Location|Address) reporting that they are currently under attack by a group of Headhunters. We know our presence in the system has upset the Headhunters, but it hardly excuses this unprovoked attack.\n\nIf available, please gather your gear and head out. Just understand that Headhunters are experienced fighters and will not back down easily.\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n<EM4>Potential Blueprints</EM4>\n<EM4>[Regional Variants] example locations: Pyro IV, Pyro V, Ignis</EM4>\n- Karna Rifle\n- Artimex Core Canuto\n- Artimex Arms Canuto\n- Artimex Legs Canuto\n- Artimex Helmet Canuto\n- Karna Rifle Battery (35 cap)\n\n<EM4>[Regional Variants] example locations: Terminus, PYR6 L1, PYR6 L2</EM4>\n- Karna "Rager" Rifle\n- Artimex Core Wildwood\n- Artimex Arms Wildwood\n- Artimex Legs Wildwood\n- Artimex Helmet Wildwood\n- Karna Rifle Battery (35 cap)\n
cfp_eliminateall_fromCFP_XT_M_desc_001=XenoThreat forces launched an unprovoked attack near ~mission(Location|Address). We're looking for any available combat operators to go and provide support. \n\nIf you haven't dealt with them before, it's important to know that XenoThreat are trained fighters so this will not be an easy fight, but it's a necessary one.\n\nGood luck,\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Potential Blueprints (Pyro IV/V Area Only)</EM4>\n- Karna Rifle\n- Artimex Core Canuto\n- Artimex Arms Canuto\n- Artimex Legs Canuto\n- Artimex Helmet Canuto\n- Karna Rifle Battery (35 cap)\n
cfp_eliminateall_fromCFP_Gen_E_desc_001=Citizens for Prosperity is looking for any available combat operators to ~mission(Location|Address). A group of outlaws have launched an unprovoked attack and our security personnel are desperately in need of support.\n\nPlease dispatch to ~mission(Location) with all urgency and good luck.\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Potential Blueprints</EM4>\n- Karna Rifle\n- Artimex Core Canuto\n- Artimex Arms Canuto\n- Artimex Legs Canuto\n- Artimex Helmet Canuto\n- Karna Rifle Battery (35 cap)\n
cfp_defend_headhunters_H_desc_001=A distress call just came in from ~mission(Location|Address) claiming that a large Headhunter force has just attacked our outpost there. There have been multiple deaths and injuries from those who managed to flee the scene. We're looking for any available security personnel to head there and retake the outpost.\n\nWitness accounts identified the attackers as elite Headhunter enforcers, so watch yourself out there and bring help if you can. \n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Potential Blueprints</EM4>\n- Karna Rifle\n- Artimex Arms\n- Artimex Core\n- Artimex Legs\n- Artimex Helmet\n- Karna Rifle Battery (35 cap)\n
cfp_defend_headhunters_M_desc_001=Headhunters have launched an unprovoked attack against ~mission(Location|Address). Although we don't support the use of violence, Citizens for Prosperity won't let innocent people die. We need qualified security personnel to retake the outpost.\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Potential Blueprints</EM4>\n- Karna Rifle\n- Artimex Arms\n- Artimex Core\n- Artimex Legs\n- Artimex Helmet\n- Karna Rifle Battery (35 cap)\n
cfp_defend-xenothreat_desc_003=Urgent!\n\nXenoThreat is mobilizing for a massive incursion to wipe ~mission(Location|Address) off the map. You’re their only hope of enduring this assault and protecting them from XenoThreat’s cruelty.\n\nI know I’m asking you to put yourself in the line of fire, but this system won’t change unless people like you are brave enough to take on these dangers. No amount of credits could measure up to how much good you’d be doing by stepping in.\n\nIf you’re willing and able to take on this mission, make sure to take some allies with you. XenoThreat will certainly send in stronger reinforcements once they realize they’re taking losses.\n\nWe believe in you.\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Potential Blueprints</EM4>\n- Karna Rifle\n- Artimex Arms\n- Artimex Core\n- Artimex Legs\n- Artimex Helmet\n- Karna Rifle Battery (35 cap)\n
cfp_defend-xenothreat_desc_002=Urgent!\n\nXenoThreat is targeting ~mission(Location|Address) to send a message to other settlers about what happens if they accept our support. \n\nIf you’re able to fend off the attackers, I’m sure they’ll send additional forces, so you’ll need to dig in for multiple assaults. Since XenoThreat has a lot of resources at their disposal, you should think about recruiting others to help you keep everyone safe.\n\nWe’re all counting on you.\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Potential Blueprints</EM4>\n- Karna Rifle\n- Artimex Arms\n- Artimex Core\n- Artimex Legs\n- Artimex Helmet\n- Karna Rifle Battery (35 cap)\n
cfp_ChainElimAll_1C_HHAttack_M_desc_001=We just received a frantic comm from ~mission(Location|Address) and are looking for any available combat specialists to help repel a Headhunter attack. There are still hostiles on site and there are reports of several casualties so we need this handled quickly.\n\nI will provide all relevant data upon acceptance. Thank you for your assistance.\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Potential Blueprints</EM4>\n- Karna "Fate" Rifle\n- Artimex Core (Modified)\n- Artimex Arms (Modified)\n- Karna Rifle Battery (35 cap)\n
cfp_defend-xenothreat_desc_001=We’ve learned that XenoThreat is about to launch an attack on ~mission(Location|Address). If they are successful, the number of casualties is expected to be high. I’m hoping that with your aid in defending them, we can make sure that doesn’t happen.\n \nWe know from past encounters that XenoThreat sends several raiding parties to carry out their attacks, so make sure you don’t leave the outpost until you’ve fought off all the reinforcements. \n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Potential Blueprints</EM4>\n- Karna "Fate" Rifle\n- Artimex Core (Modified)\n- Artimex Arms (Modified)\n- Karna Rifle Battery (35 cap)\n
cfp_ChainElimAll_1C_ElimSpec_GenAttack_E_desc_001=We need any available security personnel to report to ~mission(Location|Address). A group of armed individuals have attacked one of our outpost clusters and we're in desperate need of help. Although the group seems to be unaffiliated with any of the known gangs, we've received word that their leader is ~mission(TargetName), a local outlaw with a vicious reputation.\n\nPlease head out as soon as you can and secure the area by taking out the outlaws and ~mission(TargetName|Last).\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Potential Blueprints</EM4>\n- Karna "Brimstone" Rifle\n- Artimex Core Lodestone\n- Artimex Arms Lodestone\n- Artimex Legs Lodestone\n- Artimex Helmet Lodestone\n- Karna Rifle Battery (35 cap)\n
cfp_ChainElimAll_2C_ElimSpec_GenAttack_M_desc_001=Several CFP clusters near ~mission(Location|Address) just got hit by a group of outlaws led by ~mission(TargetName). We're looking for any available combat specialists to help retake the outposts.\n\nI can provide the locations upon acceptance but we need to clear out the main outpost and satellite installations from all hostile forces and take out ~mission(TargetName|Last) as it's unlikely that they will not cease their hostilities if they escape.\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Potential Blueprints</EM4>\n- Karna "Brimstone" Rifle\n- Artimex Core Lodestone\n- Artimex Arms Lodestone\n- Artimex Legs Lodestone\n- Artimex Helmet Lodestone\n- Karna Rifle Battery (35 cap)\n
cfp_ChainElimAll_3C_ElimSpec_GenAttack_M_desc_001=The outlaw presence here has become much bolder of late and a lot of people are getting hurt. We've recently lost several clusters around ~mission(Location|Address). While we don't like to have to resort to violence, the board has acknowledged that these locations are crucial to establishing stability in the system and authorized the use of a security detail to retake them.\n\nWe're also aware that the embedded hostiles are being led by ~mission(TargetName) who's had a history of attacking CFP interests. The board would like ~mission(TargetName|Last) dealt with to prevent future attacks.\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Potential Blueprints</EM4>\n- Karna "Fate" Rifle\n- Artimex Core (Modified)\n- Artimex Arms (Modified)\n- Karna Rifle Battery (35 cap)\n
cfp_ChainElimAll_1C_ElimSpec_HHAttack_M_desc_001=We are currently looking for any qualified and available security operatives to head out to ~mission(Location|Address) and reclaim a CFP installation that had been taken by Headhunters. \n\nThe group that's currently occupying the outpost is being led by ~mission(TargetName), a Headhunter of some note who's had a history of aggression against locals and CFP volunteers.\n\nWe need all Headhunters secured and ~mission(TargetName|Last) taken out.\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Potential Blueprints</EM4>\n- Karna "Brimstone" Rifle\n- Artimex Core Lodestone\n- Artimex Arms Lodestone\n- Artimex Legs Lodestone\n- Artimex Helmet Lodestone\n- Karna Rifle Battery (35 cap)\n
cfp_ChainElimAll_2C_ElimSpec_HHAttack_H_desc_001=Citizens for Prosperity is looking for any available security operatives to retake several former CFP installations near ~mission(Location|Address) from Headhunter control. These clusters were violently taken from us by ~mission(TargetName) and resulted in the deaths of many volunteers.\n\nBringing these outposts back under our control will help provide more stability to the system. Reports indicate that ~mission(TargetName|Last) tends to hide behind their rank and file, so they will likely appear once you've cleared out most of the hostiles.\n\nXenoThreat are trained and motivated so they will not give up easily.\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Potential Blueprints</EM4>\n- Karna "Brimstone" Rifle\n- Artimex Core Lodestone\n- Artimex Arms Lodestone\n- Artimex Legs Lodestone\n- Artimex Helmet Lodestone\n- Karna Rifle Battery (35 cap)\n
cfp_ChainElimAll_3C_ElimSpec_HHAttack_VH_desc_001=Citizens for Prosperity's board just authorized funds to hire security personnel to retake several clusters near ~mission(Location|Address) that have since fallen into the hands of the Headhunters. While we tried to just accept the loss, it's become apparent that they are crucial to our ongoing operations in the system.\n\nYou'll need to clear out each of the locations that will be provided but more importantly, you'll also need to take out ~mission(TargetName), who's in charge of the hostiles on site.\n\nThese Headhunters are heavily embedded and have a history of violence, so you should prepare accordingly. \n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Potential Blueprints</EM4>\n- Karna "Fate" Rifle\n- Artimex Core (Modified)\n- Artimex Arms (Modified)\n- Karna Rifle Battery (35 cap)\n
cfp_ChainElimAll_2C_ElimSpec_XTAttack_H_desc_001=Looking for any available security personnel to reclaim several clusters previously lost to XenoThreat aggressors. Located near ~mission(Location|Address), they had been seized in brutal attacks led by ~mission(TargetName), a notorious XenoThreat lieutenant.\n\nWe're looking to take these clusters back so we can reestablish operations and continue our good work. You'll need to clear all the hostiles still on-site as well as ~mission(TargetName|Last).\n\nJust a reminder, that XenoThreat are highly trained and quick to fight, so prepare accordingly.\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Potential Blueprints</EM4>\n- Karna "Brimstone" Rifle\n- Artimex Core Lodestone\n- Artimex Arms Lodestone\n- Artimex Legs Lodestone\n- Artimex Helmet Lodestone\n- Karna Rifle Battery (35 cap)\n
cfp_ChainElimAll_3C_ElimSpec_XTAttack_VH_desc_001=Although Citizens for Prosperity is committed to change through non-violent means, it's become apparent that exceptions might have to be made. CFP safe zones near ~mission(Location|Address) were recently and violently taken by XenoThreat forces under the command of ~mission(TargetName).\n\nWe're looking for any available combat operatives to help take these outposts back. This will undoubtedly be a difficult endeavor as XenoThreat are highly trained and eager to fight, so you should prepare accordingly.\n\nAside from clearing each cluster of XenoThreat forces, you will need to take out ~mission(TargetName|Last), who's loss will certainly make the system safer.\n\nGood luck,\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Potential Blueprints</EM4>\n- Karna "Fate" Rifle\n- Artimex Core (Modified)\n- Artimex Arms (Modified)\n- Karna Rifle Battery (35 cap)\n
cfp_defend_boss_Generic_desc_001=We just received reports of a massive attack against ~mission(Location) by a large group of armed individuals led by ~mission(TargetName), a notorious outlaw who has been threatening Citizens for Prosperity personnel for months. Details are still yet to be confirmed but we know there have been multiple casualties.\n\nCitizens for Prosperity is looking for any qualified security personnel to go and retake the outposts from these hostile elements. Our understanding is that ~mission(TargetName|Last) tends to hide behind their soldiers, but will emerge if you take enough of the rank-and-file out.\n\nWhile we don't like to resort to violence, management can see no other way of resolving this situation and continuing our good work in the system.\n\nGood luck,\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Potential Blueprints</EM4>\n- Karna Rifle\n- Artimex Core Canuto\n- Artimex Arms Canuto\n- Artimex Legs Canuto\n- Artimex Helmet Canuto\n- Karna Rifle Battery (35 cap)\n
CFP_RecoverCargo_Easy_Description=Life is tough on the frontier, and every delivery to our settlers is important. We really can't afford to lose any more this year.\n\nOne of our key suppliers has been hit by a group of outlaws over at <EM4>~mission(Location|Address)</EM4> and gone silent on us. I fear the worst, but if we can still recover the supplies they were transporting, it could make a huge difference.\n\nChances are the outlaws who attacked them are still lurking around there so be on your guard. Once you've dealt with them, grab the cargo and take it to the freight elevator at <EM4>~mission(Destination|Address)</EM4>. Make sure you're flying a ship that can carry <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4> and bring a <EM4>heavy-duty tractor beam</EM4> too.\n\nFly safe out there,\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Potential Blueprints</EM4>\n- P8-SC SMG\n- C54 SMG\n- S71 Rifle\n- ORC-mkX Arms Woodland\n- ORC-mkX Legs Woodland\n- ORC-mkX Core Woodland\n- ORC-mkX Helmet Woodland\n- ORC-mkV Arms\n- ORC-mkV Legs\n- ORC-mkV Core\n- G-2 Helmet Woodland\n- P8-SC SMG Magazine (45 cap)\n- C54 SMG Magazine (50 cap)\n- S71 Rifle Magazine (30 cap)\n
CFP_RecoverCargo_Medium_Description=A Citizens for Prosperity ship has been ambushed by a group of outlaws over at <EM4>~mission(Location|Address)</EM4> and we need a skilled pilot to help them out.\n\nWe lost contact with them mid comms, but it sounded like they were taking heavy fire. It may be too late for them, but the vital supplies they were carrying could still be put to good use. Fly over there, take out any hostiles, and recover the shipment. You'll need a ship that can support <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4> and a <EM4>heavy-duty tractor beam</EM4> to transport the supplies onto your ship.\n\nTake them to the freight elevator at <EM4>~mission(Destination|Address)</EM4> and I'll guarantee they'll be put to good use.\n\nBe safe out there,\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Potential Blueprints</EM4>\n- P8-SC SMG\n- C54 SMG\n- S71 Rifle\n- ORC-mkX Arms Woodland\n- ORC-mkX Legs Woodland\n- ORC-mkX Core Woodland\n- ORC-mkX Helmet Woodland\n- ORC-mkV Arms\n- ORC-mkV Legs\n- ORC-mkV Core\n- G-2 Helmet Woodland\n- P8-SC SMG Magazine (45 cap)\n- C54 SMG Magazine (50 cap)\n- S71 Rifle Magazine (30 cap)\n
CFP_RecoverCargo_Hard_Description=We were in the process of delivering an urgent shipment to the folks over at <EM4>~mission(Destination|Address)</EM4> when our pilot ran into a group of outlaws. They tried to run, but it was already too late.\n\nThere is silver lining though. The trackers are showing the cargo is still intact, located at <EM4>~mission(Location|Address)</EM4>. There's a good chance the outlaws are guarding it while they locate a ship big enough to transport everything. While I don't want to risk losing another pilot, the need of the cargo aboard is desperate enough that it justifies the decision to send someone to recover it.\n\nThis won't be easy, these outlaws showed our pilot no mercy. You'll need to take them out first before getting the cargo back. Bring a ship that can store <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4> and a <EM4>heavy-duty tractor beam</EM4> for the moving. Deliver it to the freight elevator at <EM4>~mission(Destination)</EM4>  and let's make this right.\n\nFly safe,\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Potential Blueprints</EM4>\n- P8-SC SMG\n- C54 SMG\n- S71 Rifle\n- ORC-mkX Arms Woodland\n- ORC-mkX Legs Woodland\n- ORC-mkX Core Woodland\n- ORC-mkX Helmet Woodland\n- ORC-mkV Arms\n- ORC-mkV Legs\n- ORC-mkV Core\n- G-2 Helmet Woodland\n- P8-SC SMG Magazine (45 cap)\n- C54 SMG Magazine (50 cap)\n- S71 Rifle Magazine (30 cap)\n
CFP_RecoverCargo_VeryHard_Description=More and more CFP ships are being targeted lately, and despite our best efforts to keep our trading routes quiet, we're still losing haulers to outlaw attacks.\n\nOur pilot over at <EM4>~mission(Location|Address)</EM4> is the latest casualty. It pains me to think about how much we've lost, but as long as there are people who need our help, we have to keep on fighting.\n\nIf you have a ship that can carry <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4> and a <EM4>heavy-duty tractor beam</EM4>, we need you to head to the above location and recover that cargo.\n\nThis won't be easy, the pilot was one of our best and wouldn't go down without a fight. Let's not underestimate these outlaws, bring a trustworthy crew and watch each other's backs.\n\nOnce you've got the cargo, deliver it to the freight elevator at <EM4>~mission(Destination|Address)</EM4> and I'll get it processed.\n\nGood luck and take care,\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Potential Blueprints</EM4>\n- P8-SC SMG\n- C54 SMG\n- S71 Rifle\n- ORC-mkX Arms Woodland\n- ORC-mkX Legs Woodland\n- ORC-mkX Core Woodland\n- ORC-mkX Helmet Woodland\n- ORC-mkV Arms\n- ORC-mkV Legs\n- ORC-mkV Core\n- G-2 Helmet Woodland\n- P8-SC SMG Magazine (45 cap)\n- C54 SMG Magazine (50 cap)\n- S71 Rifle Magazine (30 cap)\n
CFP_RecoverCargo_Super_Description=I wouldn't normally ask someone to do something so risky, but these are exceptional circumstances.\n\nOur pilot was transporting some vital cargo when they were targeted by a group of outlaws. Under no circumstances can we allow them to get their hands on the cargo.\n\nWith the size of the hostile force who attacked, you won't be able to do this on your own, you'll need to bring a skilled crew with you to  <EM4>~mission(Location|Address)</EM4> in order to  take out these outlaws and get the cargo back. Make sure at least one of you has a ship that can store <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4> and a <EM4>heavy-duty tractor beam</EM4>.\n\nIf by some miracle you can get that cargo back, take it to the freight elevator located at <EM4>~mission(Destination|Address)</EM4>.\n\nIt's a lot to ask, but if you can pull this off you'll have my and the whole organizations appreciation.\n\nBest of luck,\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Potential Blueprints</EM4>\n- P8-SC SMG\n- C54 SMG\n- S71 Rifle\n- ORC-mkX Arms Woodland\n- ORC-mkX Legs Woodland\n- ORC-mkX Core Woodland\n- ORC-mkX Helmet Woodland\n- ORC-mkV Arms\n- ORC-mkV Legs\n- ORC-mkV Core\n- G-2 Helmet Woodland\n- P8-SC SMG Magazine (45 cap)\n- C54 SMG Magazine (50 cap)\n- S71 Rifle Magazine (30 cap)\n
eckhart_defendship_VLRT_desc_001=ECKHART SECURITY, LLC.\nCONTRACTS & DISPATCH\n\nCONTRACT TYPE: Defend Ship\nAPPROVAL CODE = ~mission(ApprovalCode)\n\nFOR IMMEDIATE PROCESSING\n\nA client is reporting trouble near <EM4>~mission(Location|Address)</EM4>. Based on their comms, it doesn’t sound like an organized, professional attack. Still, we’re paid to provide protection and it’s been requested. \n\nNeed a contractor to fly there and secure the situation.\n\nPayment will be issued upon successful completion of contract.\n\nThis contract is non-negotiable.\n\nThis message may contain confidential, proprietary, privileged and/or private information. The information is intended to be for the use of the individual or entity designated above.\n\n<EM4>Potential Blueprints</EM4>\n- R97 Shotgun\n- Monde Arms\n- Monde Core\n- Monde Legs\n- Monde Helmet\n- Monde Arms Hiro\n- Monde Core Hiro\n- Monde Legs Hiro\n- Monde Helmet Hiro\n- R97 Shotgun Magazine (18 cap)\n
eckhart_defendship_LRT_desc_001=ECKHART SECURITY, LLC.\nCONTRACTS & DISPATCH\n\nCONTRACT TYPE: Defend Ship\nAPPROVAL CODE = ~mission(ApprovalCode)\n\nFOR IMMEDIATE PROCESSING\n\nOne of our clients got the brilliant idea to test their dogfighting skills in a real world scenario. Doesn’t sound like it’s going well, because they comm’d us asking for some support. \n\nHead to <EM4>~mission(Location|Address)</EM4> and help clean up the mess they created.\n\nPayment will be issued upon successful completion of contract.\n\nThis contract is non-negotiable.\n\nThis message may contain confidential, proprietary, privileged and/or private information. The information is intended to be for the use of the individual or entity designated above.\n\n<EM4>Potential Blueprints</EM4>\n- R97 Shotgun\n- Monde Arms\n- Monde Core\n- Monde Legs\n- Monde Helmet\n- Monde Arms Hiro\n- Monde Core Hiro\n- Monde Legs Hiro\n- Monde Helmet Hiro\n- R97 Shotgun Magazine (18 cap)\n
eckhart_defendship_MRT_desc_001=ECKHART SECURITY, LLC.\nCONTRACTS & DISPATCH\n\nCONTRACT TYPE: Defend Ship\nAPPROVAL CODE = ~mission(ApprovalCode)\n\nFOR IMMEDIATE PROCESSING\n\nA high-profile client decided to tour Nyx system but got jumped by hostile ships around <EM4>~mission(Location|Address)</EM4>. \n\nSounds like they’re overwhelmed. Any chance you could head to their location and provide support? \n\nPayment will be issued upon successful completion of contract.\n\nThis contract is non-negotiable.\n\nThis message may contain confidential, proprietary, privileged and/or private information. The information is intended to be for the use of the individual or entity designated above.\n\n<EM4>Potential Blueprints</EM4>\n- R97 Shotgun\n- Monde Arms\n- Monde Core\n- Monde Legs\n- Monde Helmet\n- Monde Arms Hiro\n- Monde Core Hiro\n- Monde Legs Hiro\n- Monde Helmet Hiro\n- R97 Shotgun Magazine (18 cap)\n
eckhart_defendship_multi_HRT_desc_001=ECKHART SECURITY, LLC.\nCONTRACTS & DISPATCH\n\nCONTRACT TYPE: Defend Ship\nAPPROVAL CODE = ~mission(ApprovalCode)\n\nFOR IMMEDIATE PROCESSING\n\nRecently, we recommended that a client use a specific route to cross Nyx safely. Turns out it wasn’t as secure as we assumed, because a group ambushed our client’s ship. We need to get this cleaned up ASAP. Are you available to help? \n\nIntel from the client indicates a well-organized attack, so you better be equipped to deal with experienced hostiles on this one. Hurry to <EM4>~mission(Location|Address)</EM4>, help them survive this, and we’ll pay you well for your trouble.\n\nPayment will be issued upon successful completion of contract.\n\nThis contract is non-negotiable.\n\nThis message may contain confidential, proprietary, privileged and/or private information. The information is intended to be for the use of the individual or entity designated above.\n\n<EM4>Potential Blueprints</EM4>\n- R97 Shotgun\n- Monde Arms\n- Monde Core\n- Monde Legs\n- Monde Helmet\n- Monde Arms Hiro\n- Monde Core Hiro\n- Monde Legs Hiro\n- Monde Helmet Hiro\n- R97 Shotgun Magazine (18 cap)\n
eckhart_defendship_multi_VHRT_desc_001=ECKHART SECURITY, LLC.\nCONTRACTS & DISPATCH\n\nCONTRACT TYPE: Defend Ship\nAPPROVAL CODE = ~mission(ApprovalCode)\n\nFOR IMMEDIATE PROCESSING\n\nDespite our warnings, a client decided to fly to <EM4>~mission(Location|Address)</EM4>. Unsurprisingly, they just dropped a rescue beacon in the area, so we’re looking for a contractor to get on site, assess the situation, and hopefully rescue the client.\n\nWe warned them that extremely dangerous and well-equipped outlaws often strike ships there. That’s exactly what I assume happened here, so make sure you plan accordingly.  \n\nPayment will be issued upon successful completion of contract.\n\nThis contract is non-negotiable.\n\nThis message may contain confidential, proprietary, privileged and/or private information. The information is intended to be for the use of the individual or entity designated above.\n\n<EM4>Potential Blueprints</EM4>\n- R97 Shotgun\n- Monde Arms\n- Monde Core\n- Monde Legs\n- Monde Helmet\n- Monde Arms Hiro\n- Monde Core Hiro\n- Monde Legs Hiro\n- Monde Helmet Hiro\n- R97 Shotgun Magazine (18 cap)\n
eckhart_defendship_multi_SRT_desc_001=ECKHART SECURITY, LLC.\nCONTRACTS & DISPATCH\n\nCONTRACT TYPE: Defend Ship\nAPPROVAL CODE = ~mission(ApprovalCode)\n\nFOR IMMEDIATE PROCESSING\n\nWe have a client currently under attack at <EM4>~mission(Location|Address)</EM4>. We have a long history with this client and know that they’re a skilled dogfighter. If they’re struggling to survive, then this situation must be dire.\n \nWe’re looking for a top-tier dogfighter to head out there and provide support. If you’re available, then this client could really use your help. \n\nPayment will be issued upon successful completion of contract.\n\nThis contract is non-negotiable.\n\nThis message may contain confidential, proprietary, privileged and/or private information. The information is intended to be for the use of the individual or entity designated above.\n\n<EM4>Potential Blueprints</EM4>\n- R97 Shotgun\n- Monde Arms\n- Monde Core\n- Monde Legs\n- Monde Helmet\n- Monde Arms Hiro\n- Monde Core Hiro\n- Monde Legs Hiro\n- Monde Helmet Hiro\n- R97 Shotgun Magazine (18 cap)\n
Foxwell_bombingrun_VE_desc_001=A bunch of outlaws have been harassing our client and recently things have taken a turn for the worse. They've taken over their property and we've exhausted all other options.\n\nWe need a decent pilot to head to <EM4>~mission(Location|Address)</EM4> and take out their fuel tanks. If you can cut off their supplies, you can pave the way for the client to take back their property.\n\nThis shouldn't be a tough one. You might run into a ship or two and maybe a few turrets, but you've been authorized to use lethal force. All we need for you to do is get in there, get the fuel tanks, and get out.\n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Potential Blueprints</EM4>\n- Antium Arms Maroon\n- Antium Core Maroon\n- Antium Legs Maroon\n- Antium Helmet Maroon\n- Antium Helmet Moss Camo\n- Antium Arms Moss Camo\n- Antium Core Moss Camo\n- Antium Legs Moss Camo\n
Foxwell_bombingrun_E_desc_001=We've just received the location of an outlaw outpost where some up-and-coming criminals have been hanging out. Now, our client says there's no reason to engage these folks directly. Instead you will be targeting their supply lines.\n\nFly on over to <EM4>~mission(Location|Address)</EM4> and take out their fuel stores while dealing with any minimal resistance they may put up. It will be your call on how much you engage with the hostile forces, just don't forget that your main objective is ensuring those fuel tanks are out of action.\n\nThis is a yellow level contract so pay will be proportionate.\n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Potential Blueprints</EM4>\n- Antium Arms Maroon\n- Antium Core Maroon\n- Antium Legs Maroon\n- Antium Helmet Maroon\n- Antium Helmet Moss Camo\n- Antium Arms Moss Camo\n- Antium Core Moss Camo\n- Antium Legs Moss Camo\n
Foxwell_bombingrun_M_desc_001=We're in need of a sharp contractor for a hit and run operation. Client says some local thugs have been congregating in concerning numbers and we have been tasked with disrupting their base of operations.\n\nGet on over to <EM4>~mission(Location|Address)</EM4> and take out their fuel tanks. If you're successful we can set these folks plans back a while, and most importantly, without having to deal with them directly.\n\nReports are showing there's a couple of ships buzzing around the area and some defense turrets. Just focus on the fuel tanks and you should be alright.\n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Potential Blueprints</EM4>\n- Antium Arms Maroon\n- Antium Core Maroon\n- Antium Legs Maroon\n- Antium Helmet Maroon\n- Antium Helmet Moss Camo\n- Antium Arms Moss Camo\n- Antium Core Moss Camo\n- Antium Legs Moss Camo\n
Foxwell_bombingrun_H_desc_001=An opportunity has presented itself for a client to take action against a group of criminals who have been harassing their business.\n\nAccording to reports, this group of outlaws are currently laying low at <EM4>~mission(Location|Address)</EM4>. The client thinks this is a good time to catch them off guard and bring them to justice. The job is to take out their fuel tanks and putting an end to their smuggling operations once and for all.\n\nThese folks are not to be underestimated. You better bring some backup and fly low to avoid the turrets. Priority as always is the fuel tanks.\n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Potential Blueprints</EM4>\n- Antium Arms Maroon\n- Antium Core Maroon\n- Antium Legs Maroon\n- Antium Helmet Maroon\n- Antium Helmet Moss Camo\n- Antium Arms Moss Camo\n- Antium Core Moss Camo\n- Antium Legs Moss Camo\n
Foxwell_bombingrun_VH_desc_001=Foxwell have been hired by a client to take part in a multi-stage operation on a known outlaw base at <EM4>~mission(Location|Address)</EM4> and need a strong pilot to play their part in this.\n\nYou, and whatever additional support ships you arrange, will be tasked with taking out the fuel tanks located there to set the stage for the rest of the operation to follow. \n\nUnfortunately, this place is swarming with ships and anti-air turrets. So make sure you and your people are ready, and remember, the fuel tanks are your priority. No need to be a hero.\n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Potential Blueprints</EM4>\n- Antium Arms Maroon\n- Antium Core Maroon\n- Antium Legs Maroon\n- Antium Helmet Maroon\n- Antium Helmet Moss Camo\n- Antium Arms Moss Camo\n- Antium Core Moss Camo\n- Antium Legs Moss Camo\n
Foxwell_bombingrun_S_desc_001=We are looking for a highly competent mercenary team to assist with a challenging demolition for a VIP client.\n\nThe outlaws operating at <EM4>~mission(Location|Address)</EM4> has been identified as a threat of growing concern in the area and to help deal with this situation your team is being tasked with taking out the fuel tanks at the location. \n\nHowever, it won't be as easy as just slipping in and out - expect to deal with multiple hostiles and turrets that will be expecting you. The stronger your crew the better your chances at completing this operation successfully.\n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Potential Blueprints</EM4>\n- Antium Arms Maroon\n- Antium Core Maroon\n- Antium Legs Maroon\n- Antium Helmet Maroon\n- Antium Helmet Moss Camo\n- Antium Arms Moss Camo\n- Antium Core Moss Camo\n- Antium Legs Moss Camo\n
foxwell_DefendShip_E_desc_001=Foxwell is looking for an available combat pilot to provide immediate assistance to a ~mission(Ship) under attack over by ~mission(Location|Address). We have not identified the perpetrators in the attack, but have been assured it is a small force.\n\nPlease dispatch quickly and clear out all hostiles. We need the client to make it through this as they haven't paid us yet.\n\nGood luck,\n\nMarcus Clenn\nFoxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Potential Blueprints</EM4>\n- Antium Arms Maroon\n- Antium Core Maroon\n- Antium Legs Maroon\n- Antium Helmet Maroon\n- Antium Helmet Moss Camo\n- Antium Arms Moss Camo\n- Antium Core Moss Camo\n- Antium Legs Moss Camo\n
foxwell_DefendShip_M_desc_001=Got an orange level contract for any available combat pilots. A ~mission(Ship) is under attack around ~mission(Location|Address) and is in desperate need for assistance. We're not sure how many perpetrators there are, but they seem motivated and dangerous so exercise caution.\n\nOnce on site, engage and destroy any hostiles you encounter and protect the client. Once they've transferred the credits, we'll route you your payment.\n\nMarcus Clenn\nFoxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Potential Blueprints</EM4>\n- Antium Arms Maroon\n- Antium Core Maroon\n- Antium Legs Maroon\n- Antium Helmet Maroon\n- Antium Helmet Moss Camo\n- Antium Arms Moss Camo\n- Antium Core Moss Camo\n- Antium Legs Moss Camo\n
foxwell_DefendShip_H_desc_001=An emergency contract just came in about a fight near ~mission(Location|Address). Apparently a group of ships were ambushed by outlaws led by ~mission(TargetName), who's been wanted on multiple planets for murder and ship theft. Foxwell's looking for top tier combat pilots to go and protect the clients against them.\n\nThis one's been flagged as a red level contract so it's really dangerous. If you have people you could bring, you probably should. If you do, you should also let them know about Foxwell's hiring policies. \n\nMarcus Clenn\nFoxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Potential Blueprints</EM4>\n- Antium Arms Maroon\n- Antium Core Maroon\n- Antium Legs Maroon\n- Antium Helmet Maroon\n- Antium Helmet Moss Camo\n- Antium Arms Moss Camo\n- Antium Core Moss Camo\n- Antium Legs Moss Camo\n
Foxwell_Mercenary_Rehire_desc_001=Due to a corporate restructuring, Foxwell has some new vacancies that need to be filled immediately. Foxwell knows you’ve previously expressed interest in this line of work, and we’re wondering if you would want to take another crack at a contract.\n\nOne of our clients needs support at <EM4>~mission(Location|Address)</EM4> where their security forces are struggling to handle an outlaw incursion. Head there and help the local forces get rid of the problem before it’s too late. \n\nSuccessfully complete this contract, and Foxwell would be happy to send more work your way.\n\n\nMarcus Clenn\nFoxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Potential Blueprints</EM4>\n- Antium Arms Maroon\n- Antium Core Maroon\n- Antium Legs Maroon\n- Antium Helmet Maroon\n- Antium Helmet Moss Camo\n- Antium Arms Moss Camo\n- Antium Core Moss Camo\n- Antium Legs Moss Camo\n
Foxwell_EliminateAll_Allies_desc_001=Got word that outlaws are attempting to overrun <EM4>~mission(Location|Address)</EM4>. There’s local security forces there, but they’re struggling to stop that attack.\n\nNeed a contractor to hustle there and help take care of the aggressors. Bring plenty of gear, and be careful when engaging targets. Don’t want to hear about any security team members getting caught in your crossfire.    \n\n\nMarcus Clenn\nFoxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Potential Blueprints</EM4>\n- Antium Arms Maroon\n- Antium Core Maroon\n- Antium Legs Maroon\n- Antium Helmet Maroon\n- Antium Helmet Moss Camo\n- Antium Arms Moss Camo\n- Antium Core Moss Camo\n- Antium Legs Moss Camo\n
Foxwell_EliminateAll_NonHostiles_desc_001=We’ve been contracted to take care of a delicate situation. A gang has settled into <EM4>~mission(Location|Address)</EM4> that we need to get cleared out. Only issue is that there’s still some civilians there too. \n\nLooking for someone with the skills and good trigger sense to get rid of those outlaws without harming any innocent people. If that’s you, grab your gear and get over there. \n\n\nMarcus Clenn\nFoxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Potential Blueprints</EM4>\n- Antium Arms Maroon\n- Antium Core Maroon\n- Antium Legs Maroon\n- Antium Helmet Maroon\n- Antium Helmet Moss Camo\n- Antium Arms Moss Camo\n- Antium Core Moss Camo\n- Antium Legs Moss Camo\n
Foxwell_EliminateAll_desc_001=Looking for someone willing to take out the trash at <EM4>~mission(Location|Address)</EM4>. Guess a gang has settled in without the permission of the owners. So they’ve hired us to get them out whatever way we see fit. \n\nI’d bring plenty of ammo, if I were you. Doubt they’ll want to leave willingly. \n\n\nMarcus Clenn\nFoxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Potential Blueprints</EM4>\n- Antium Arms Maroon\n- Antium Core Maroon\n- Antium Legs Maroon\n- Antium Helmet Maroon\n- Antium Helmet Moss Camo\n- Antium Arms Moss Camo\n- Antium Core Moss Camo\n- Antium Legs Moss Camo\n
Foxwell_EliminateSpecific_desc_001=Looking to execute a bounty on <EM4>~mission(TargetName)</EM4>. We’ve learned that they’re currently hiding out with some confederates at <EM4>~mission(Location|Address)</EM4>. \n\nI’d be prepared to deal with the lowlifes hanging around <EM4>~mission(TargetName|Last)</EM4>, but our only real concern is that you land the target. \n    \n\nMarcus Clenn\nFoxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Potential Blueprints</EM4>\n- Antium Arms Maroon\n- Antium Core Maroon\n- Antium Legs Maroon\n- Antium Helmet Maroon\n- Antium Helmet Moss Camo\n- Antium Arms Moss Camo\n- Antium Core Moss Camo\n- Antium Legs Moss Camo\n
Foxwell_EliminateSpecific_NonHostiles_desc_001=Got a line on a bounty named <EM4>~mission(TargetName)</EM4>. Someone spotted them along with known criminal accomplices at <EM4>~mission(Location|Address)</EM4>. Need you to get there before they get going. \n\n<EM4>~mission(TargetName|Last)</EM4> has a reputation for only showing their face in places with civs. Really need you to take down this bounty without there being any civilian collateral damage. Foxwell can’t afford to be caught in the shitstorm that would erupt over the loss of innocent life. \n\n\nMarcus Clenn\nFoxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Potential Blueprints</EM4>\n- Antium Arms Maroon\n- Antium Core Maroon\n- Antium Legs Maroon\n- Antium Helmet Maroon\n- Antium Helmet Moss Camo\n- Antium Arms Moss Camo\n- Antium Core Moss Camo\n- Antium Legs Moss Camo\n
Foxwell_DestroyNarcotics_E_desc_001=Some folks will do anything for a few creds. There’s a group of upstart outlaws over at <EM4>~mission(Location|Address)</EM4> that have decided to start manufacturing drugs. Turns out they’re not too good at it, or maybe a little too good. The junk they’re pumping out is stronger than the normal stuff and a real danger to anyone who uses it. \n\nWe’ve been hired to knock out their operation and destroy whatever drugs stashes are on site. Armed guards are protecting the place, but they don’t seem too skilled. Our surveillance teams observed one of them almost shoot himself in the foot. Can’t say for certain, but odds are they won’t give a pro like you too many problems.  \n\n\nMarcus Clenn\nFoxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Potential Blueprints</EM4>\n- Antium Arms Maroon\n- Antium Core Maroon\n- Antium Legs Maroon\n- Antium Helmet Maroon\n- Antium Helmet Moss Camo\n- Antium Arms Moss Camo\n- Antium Core Moss Camo\n- Antium Legs Moss Camo\n
Foxwell_DestroyNarcotics_M_desc_001=We’ve been contracted to take care of a problem at <EM4>~mission(Location|Address)</EM4>. There’s been a recent surge of activity in the area tied to the drug trade. It appears to be a well-run operation and there’s a growing concern that it’ll expand wider if not stopped. Any chance you’re available to make sure that doesn’t happen?   \n\nJob is pretty straightforward. Head to the site and destroy their stash of drugs. That way they won’t have the creds to expand their operations any further. I wouldn’t expect them to make this easy on you though. Armed guards are regularly seen around the facility, so be sure you’ve got enough gear to deal with them too. \n\n\nMarcus Clenn\nFoxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Potential Blueprints</EM4>\n- Antium Arms Maroon\n- Antium Core Maroon\n- Antium Legs Maroon\n- Antium Helmet Maroon\n- Antium Helmet Moss Camo\n- Antium Arms Moss Camo\n- Antium Core Moss Camo\n- Antium Legs Moss Camo\n
Foxwell_DestroyNarcotics_H_desc_001=Reports of a spike in drug overdoses around Stanton has security services worried. Seems like some two-bit crew is juicing their profits by cutting their stuff with toxic chemicals. Shutting down this crew and stopping the distribution of their drugs has become a top priority.\n\nA Foxwell informant has revealed that part of this crew has currently set up shop at <EM4>~mission(Location|Address)</EM4>. Hiring a contractor to hustle over there and destroy whatever drugs they’ve got stashed before they’re spread across the system. Better be careful though, word is this crew is armed to the teeth and determined to profit off that poison no matter what.\n\n\nMarcus Clenn\nFoxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Potential Blueprints</EM4>\n- Antium Arms Maroon\n- Antium Core Maroon\n- Antium Legs Maroon\n- Antium Helmet Maroon\n- Antium Helmet Moss Camo\n- Antium Arms Moss Camo\n- Antium Core Moss Camo\n- Antium Legs Moss Camo\n
Foxwell_EliminateAll_PAF_M_desc_001=We’ve been tracking a group of outlaws who’ve been causing trouble for one of our clients. Seems they’ve taken up residence at an old Hathor facility. Don’t know what their plans with that old facility are but our client is eager to have them taken care of.\n\nLooking for someone to go to <EM4>~mission(Location|Address)</EM4> and neutralize these targets.\n\n\nMarcus Clenn\nFoxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Potential Blueprints</EM4>\n- Antium Arms Maroon\n- Antium Core Maroon\n- Antium Legs Maroon\n- Antium Helmet Maroon\n- Antium Helmet Moss Camo\n- Antium Arms Moss Camo\n- Antium Core Moss Camo\n- Antium Legs Moss Camo\n
Foxwell_EliminateAll_OLP_M_desc_001=We’ve been following a group of outlaws on behalf of a client, and it looks like they’ve taken a permanent pit stop on an old orbital platform. \n\nWe’re looking for a contractor who can head over to <EM4>~mission(Location|Address)</EM4> and neutralize the targets. The platform is crawling with a bunch of armed and dangerous thugs, so we’ve designated this a yellow level contract.\n\n\nMarcus Clenn\nFoxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Potential Blueprints</EM4>\n- Antium Arms Maroon\n- Antium Core Maroon\n- Antium Legs Maroon\n- Antium Helmet Maroon\n- Antium Helmet Moss Camo\n- Antium Arms Moss Camo\n- Antium Core Moss Camo\n- Antium Legs Moss Camo\n
